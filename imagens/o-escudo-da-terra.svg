<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">O Escudo da Terra — o campo magnético que desvia o vento solar</title>
    <desc id="desc">O vento solar é um jato de partículas carregadas. O campo magnético da Terra as
        desvia: comprimido do lado do Sol, esticado numa cauda do lado da noite. Parte das partículas
        escorre pelas linhas do campo até os polos, onde acende as auroras. Sem o campo, o vento
        arrancaria a atmosfera aos poucos — foi o que aconteceu com Marte.</desc>

    <defs>
        <radialGradient id="espaco" cx="0.35" cy="0.4" r="0.8">
            <stop offset="0" stop-color="#182c55"/>
            <stop offset="1" stop-color="#060b1c"/>
        </radialGradient>
        <linearGradient id="terraG" x1="0.2" y1="0" x2="0.9" y2="1">
            <stop offset="0" stop-color="#4aa8f5"/>
            <stop offset="1" stop-color="#0f3f70"/>
        </linearGradient>
        <radialGradient id="solG" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#fffbe8"/>
            <stop offset="0.45" stop-color="#ffd166" stop-opacity="0.9"/>
            <stop offset="1" stop-color="#ff9d3c" stop-opacity="0"/>
        </radialGradient>

        <marker id="s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="12" markerHeight="12"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#eaf2ff; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#dce8ff; font-size:18px; font-weight:700; }
        .rotp { fill:#93aacd; font-size:14px; }
        .painel { fill:#101f3c; stroke:#3a5c92; stroke-width:2; }
    </style>

    <rect width="1400" height="800" fill="url(#espaco)"/>
    <g fill="#ffffff" opacity="0.5">
        <circle cx="420" cy="120" r="1.4"/><circle cx="700" cy="90" r="1.2"/>
        <circle cx="1180" cy="150" r="1.4"/><circle cx="900" cy="720" r="1.2"/>
        <circle cx="500" cy="740" r="1.4"/><circle cx="1320" cy="420" r="1.2"/>
    </g>

    <text class="cab" x="46" y="54">O ESCUDO DA TERRA</text>
    <text class="rotp" x="46" y="84" font-size="17">Um jato mortal de partículas — e um campo invisível que o entorta.</text>

    <!-- ══ O Sol, à esquerda, soprando o vento solar ══════════════════════ -->
    <circle cx="20" cy="430" r="180" fill="url(#solG)"/>
    <text class="rot" x="70" y="620" style="fill:#ffd166">SOL</text>
    <text class="rotp" x="70" y="642" style="fill:#e8a33a">vento solar: partículas carregadas</text>

    <!-- as partículas do vento solar -->
    <g stroke="#ffd166" stroke-width="3.5" fill="none" opacity="0.95">
        <path d="M150 250 L 330 250" marker-end="url(#s)"/>
        <path d="M150 320 L 350 320" marker-end="url(#s)"/>
        <path d="M150 390 L 360 390" marker-end="url(#s)"/>
        <path d="M150 460 L 360 460" marker-end="url(#s)"/>
        <path d="M150 530 L 350 530" marker-end="url(#s)"/>
        <path d="M150 600 L 330 600" marker-end="url(#s)"/>
    </g>

    <!-- ══ A magnetosfera: comprimida na frente, esticada atrás ═══════════ -->
    <!-- frente de choque -->
    <path d="M470 130 C 380 260, 380 600, 470 730" fill="none"
          stroke="#7fd4ff" stroke-width="2.5" stroke-dasharray="9 8" opacity="0.7"/>
    <text class="rotp" x="392" y="120" style="fill:#7fd4ff" font-size="13" text-anchor="middle">frente de choque</text>

    <!-- linhas do campo: fechadas na frente, abertas na cauda -->
    <g fill="none" stroke="#7fd4ff" stroke-width="2.5" opacity="0.9">
        <path d="M840 372 C 700 300, 560 320, 520 430 C 560 540, 700 560, 840 488"/>
        <path d="M846 340 C 660 200, 480 260, 470 430 C 480 600, 660 660, 846 520"/>
        <path d="M852 316 C 620 120, 400 220, 420 430 C 400 640, 620 740, 852 544"/>
        <!-- a cauda, soprada para longe do Sol -->
        <path d="M880 356 C 1020 300, 1180 292, 1340 300"/>
        <path d="M880 386 C 1020 350, 1180 344, 1340 348"/>
        <path d="M880 474 C 1020 510, 1180 516, 1340 512"/>
        <path d="M880 504 C 1020 560, 1180 568, 1340 560"/>
    </g>
    <text class="rotp" x="1180" y="270" style="fill:#7fd4ff" font-size="13">cauda magnética (lado da noite)</text>

    <!-- ══ A Terra ════════════════════════════════════════════════════════ -->
    <g transform="translate(860,430)">
        <circle cx="0" cy="0" r="62" fill="url(#terraG)"/>
        <path d="M-52 -24 C -26 -34, 0 -14, 30 -26 C 44 -32, 56 -22, 58 -14
                 C 40 -4, 12 6, -16 0 C -34 -4, -44 -12, -52 -24 Z" fill="#4ec07a" opacity="0.85"/>
        <path d="M-40 30 C -16 20, 14 30, 40 22" stroke="#4ec07a" stroke-width="10"
              fill="none" opacity="0.8" stroke-linecap="round"/>

        <!-- as auroras, nos polos -->
        <g stroke="#7bd389" stroke-width="4" fill="none" opacity="0.95">
            <path d="M-26 -56 C -14 -74, 14 -74, 26 -56"/>
            <path d="M-20 -66 C -10 -84, 10 -84, 20 -66"/>
            <path d="M-26 56 C -14 74, 14 74, 26 56"/>
            <path d="M-20 66 C -10 84, 10 84, 20 66"/>
        </g>
        <text class="rot" x="0" y="-104" text-anchor="middle" font-size="16" style="fill:#7bd389">AURORA</text>
        <text class="rot" x="0" y="122" text-anchor="middle" font-size="16" style="fill:#7bd389">AURORA</text>
    </g>

    <!-- as partículas escorrendo pelas linhas do campo até os polos -->
    <g stroke="#ffd166" stroke-width="3" fill="none" opacity="0.9">
        <path d="M560 300 C 660 250, 760 280, 836 356" marker-end="url(#s)"/>
        <path d="M560 560 C 660 610, 760 580, 836 504" marker-end="url(#s)"/>
    </g>
    <text class="rotp" x="640" y="240" style="fill:#ffd166" font-size="13">
        as que passam escorrem pelas linhas até os polos
    </text>

    <!-- as que batem no escudo e são desviadas -->
    <g stroke="#ffd166" stroke-width="3" fill="none" opacity="0.9">
        <path d="M400 430 C 470 430, 500 350, 520 250" marker-end="url(#s)"/>
        <path d="M400 466 C 470 470, 500 560, 520 650" marker-end="url(#s)"/>
    </g>
    <text class="rot" x="470" y="700" font-size="16" style="fill:#ffd166" text-anchor="middle">DESVIADAS</text>

    <!-- ══ Painel: sem o campo ════════════════════════════════════════════ -->
    <g transform="translate(1040,600)">
        <rect class="painel" x="0" y="0" width="320" height="150" rx="14"/>
        <text class="rot" x="20" y="36" font-size="17" style="fill:#ff8f6b">SEM O CAMPO</text>
        <text class="rotp" x="20" y="64" font-size="13">o vento arranca a atmosfera aos poucos</text>
        <text class="rotp" x="20" y="88" font-size="13">— foi o que aconteceu com Marte,</text>
        <text class="rotp" x="20" y="112" font-size="13">que hoje é um deserto sem ar.</text>
    </g>

    <text class="rotp" x="46" y="775" font-size="15">
        O campo nasce do ferro líquido em movimento no núcleo: um dínamo do tamanho de um planeta.
    </text>
</svg>
