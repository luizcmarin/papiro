<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">O Olho da Libélula — 30 mil hexágonos sobre uma cúpula</title>
    <desc id="desc">Cada olho da libélula é uma cúpula coberta por até 30 mil facetas hexagonais.
        Cada faceta é um tubinho com lente própria, que olha para uma direção só e devolve um
        ponto da imagem. O hexágono é a única forma que cobre a superfície curva sem deixar
        falhas; quanto mais facetas, mais fina a imagem — e as duas cúpulas juntas enxergam
        quase 360 graus ao mesmo tempo.</desc>

    <defs>
        <linearGradient id="fundo" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#12233c"/>
            <stop offset="1" stop-color="#070d18"/>
        </linearGradient>
        <radialGradient id="cupula" cx="0.35" cy="0.3" r="0.75">
            <stop offset="0" stop-color="#8ce6f2"/>
            <stop offset="0.55" stop-color="#2f9ab5"/>
            <stop offset="1" stop-color="#175468"/>
        </radialGradient>
        <radialGradient id="cupulaLuz" cx="0.35" cy="0.3" r="0.75">
            <stop offset="0" stop-color="#ffe680" stop-opacity="0.35"/>
            <stop offset="1" stop-color="#ffe680" stop-opacity="0"/>
        </radialGradient>

        <!-- A malha hexagonal, em pattern: um ladrilho com os hexágonos das quatro
             quinas mais o do meio — repetido, encaixa sem emenda. -->
        <pattern id="hexFino" patternUnits="userSpaceOnUse" width="15.59" height="27">
            <g fill="none" stroke="#0b3040" stroke-width="1.1">
                <path d="M0 -9 L7.79 -4.5 L7.79 4.5 L0 9 L-7.79 4.5 L-7.79 -4.5 Z"/>
                <path d="M15.59 -9 L23.38 -4.5 L23.38 4.5 L15.59 9 L7.8 4.5 L7.8 -4.5 Z"/>
                <path d="M0 18 L7.79 22.5 L7.79 31.5 L0 36 L-7.79 31.5 L-7.79 22.5 Z"/>
                <path d="M15.59 18 L23.38 22.5 L23.38 31.5 L15.59 36 L7.8 31.5 L7.8 22.5 Z"/>
                <path d="M7.79 4.5 L15.58 9 L15.58 18 L7.79 22.5 L0 18 L0 9 Z"/>
            </g>
        </pattern>
        <pattern id="hexGrosso" patternUnits="userSpaceOnUse" width="45.03" height="78">
            <g fill="none" stroke="#0b3040" stroke-width="2">
                <path d="M0 -26 L22.5 -13 L22.5 13 L0 26 L-22.5 13 L-22.5 -13 Z"/>
                <path d="M45.03 -26 L67.5 -13 L67.5 13 L45.03 26 L22.5 13 L22.5 -13 Z"/>
                <path d="M0 52 L22.5 65 L22.5 91 L0 104 L-22.5 91 L-22.5 65 Z"/>
                <path d="M45.03 52 L67.5 65 L67.5 91 L45.03 104 L22.5 91 L22.5 65 Z"/>
                <path d="M22.5 13 L45 26 L45 52 L22.5 65 L0 52 L0 26 Z"/>
            </g>
        </pattern>

        <marker id="s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="11" markerHeight="11"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#e6f7fb; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#cfe9f2; font-size:18px; font-weight:700; }
        .rotp { fill:#87a9bd; font-size:14px; }
        .painel { fill:#0c1c30; stroke:#33627f; stroke-width:2; }
    </style>

    <rect width="1400" height="800" fill="url(#fundo)"/>

    <text class="cab" x="46" y="54">O OLHO DA LIBÉLULA</text>
    <text class="rotp" x="46" y="84" font-size="17">Trinta mil lentes, cada uma olhando para um lado — e nem uma fresta de cego entre elas.</text>

    <!-- ══ Esquerda: a cabeça, com as duas cúpulas ════════════════════════ -->
    <g transform="translate(46,112)">
        <rect class="painel" x="0" y="0" width="546" height="380" rx="16"/>
        <text class="rot" x="24" y="38">A CABEÇA, DE FRENTE</text>
        <text class="rotp" x="24" y="60">os olhos tomam quase toda ela</text>

        <g transform="translate(273,210)">
            <!-- cabeça -->
            <path d="M-150 -10 C -150 -84, -70 -118, 0 -118 C 70 -118, 150 -84, 150 -10
                     C 150 58, 84 96, 0 96 C -84 96, -150 58, -150 -10 Z"
                  fill="#14314a" stroke="#33627f" stroke-width="2"/>
            <!-- cúpula esquerda -->
            <g>
                <ellipse cx="-72" cy="-18" rx="70" ry="76" fill="url(#cupula)"/>
                <ellipse cx="-72" cy="-18" rx="70" ry="76" fill="url(#hexFino)" opacity="0.85"/>
                <ellipse cx="-72" cy="-18" rx="70" ry="76" fill="url(#cupulaLuz)"/>
            </g>
            <!-- cúpula direita -->
            <g>
                <ellipse cx="72" cy="-18" rx="70" ry="76" fill="url(#cupula)"/>
                <ellipse cx="72" cy="-18" rx="70" ry="76" fill="url(#hexFino)" opacity="0.85"/>
                <ellipse cx="72" cy="-18" rx="70" ry="76" fill="url(#cupulaLuz)"/>
            </g>
            <!-- mandíbula -->
            <path d="M-42 66 C -18 88, 18 88, 42 66" fill="none" stroke="#33627f" stroke-width="3"/>
        </g>

        <!-- o círculo de zoom, apontando para o painel ao lado -->
        <circle cx="380" cy="180" r="46" fill="none" stroke="#ffd24d" stroke-width="3"/>
        <path d="M414 214 L 470 262" stroke="#ffd24d" stroke-width="3" fill="none" marker-end="url(#s)"/>

        <text class="rotp" x="24" y="344">até 30 000 facetas em cada cúpula</text>
    </g>

    <!-- ══ Direita: o corte de uma faceta ═════════════════════════════════ -->
    <g transform="translate(616,112)">
        <rect class="painel" x="0" y="0" width="738" height="380" rx="16"/>
        <text class="rot" x="24" y="38" style="fill:#ffd24d">POR DENTRO DE UMA FACETA</text>
        <text class="rotp" x="24" y="60">cada hexágono é um tubo com lente própria — e olha para uma direção só</text>

        <!-- três tubos vizinhos, cada um olhando para um lado -->
        <g transform="translate(120,256)">
            <!-- feixes de luz, cada um de uma direção -->
            <g stroke="#ffe680" stroke-width="2.5" fill="none">
                <path d="M-42 -152 L -14 -108" marker-end="url(#s)"/>
                <path d="M120 -160 L 120 -112" marker-end="url(#s)"/>
                <path d="M286 -152 L 256 -108" marker-end="url(#s)"/>
            </g>

            <!-- tubo 1 -->
            <g transform="translate(-20,0)">
                <path d="M-30 -100 L 30 -100 L 18 60 L -18 60 Z" fill="#123c52" stroke="#33627f" stroke-width="2"/>
                <path d="M-30 -100 A 30 22 0 0 1 30 -100 Z" fill="#8ce6f2" opacity="0.9"/>
                <rect x="-8" y="-60" width="16" height="100" rx="6" fill="#2f9ab5" opacity="0.55"/>
                <circle cx="0" cy="72" r="9" fill="#7bd389"/>
            </g>
            <!-- tubo 2 (o do meio, rotulado) -->
            <g transform="translate(120,0)">
                <path d="M-30 -100 L 30 -100 L 18 60 L -18 60 Z" fill="#123c52" stroke="#ffd24d" stroke-width="2.5"/>
                <path d="M-30 -100 A 30 22 0 0 1 30 -100 Z" fill="#8ce6f2"/>
                <rect x="-8" y="-60" width="16" height="100" rx="6" fill="#2f9ab5" opacity="0.7"/>
                <circle cx="0" cy="72" r="9" fill="#7bd389"/>
            </g>
            <!-- tubo 3 -->
            <g transform="translate(260,0)">
                <path d="M-30 -100 L 30 -100 L 18 60 L -18 60 Z" fill="#123c52" stroke="#33627f" stroke-width="2"/>
                <path d="M-30 -100 A 30 22 0 0 1 30 -100 Z" fill="#8ce6f2" opacity="0.9"/>
                <rect x="-8" y="-60" width="16" height="100" rx="6" fill="#2f9ab5" opacity="0.55"/>
                <circle cx="0" cy="72" r="9" fill="#7bd389"/>
            </g>

            <!-- o nervo, juntando os pontos -->
            <path d="M-20 84 L 120 84 L 260 84" stroke="#7bd389" stroke-width="3" fill="none"/>
            <path d="M120 84 L 120 104" stroke="#7bd389" stroke-width="3" fill="none" marker-end="url(#s)"/>
        </g>

        <!-- legendas do corte -->
        <g>
            <path d="M448 160 L 402 160" stroke="#87a9bd" stroke-width="1.5" fill="none" marker-end="url(#s)"/>
            <text class="rotp" x="458" y="165">a lente hexagonal, na superfície</text>

            <path d="M448 228 L 402 228" stroke="#87a9bd" stroke-width="1.5" fill="none" marker-end="url(#s)"/>
            <text class="rotp" x="458" y="223">o tubo, que só deixa passar a luz</text>
            <text class="rotp" x="458" y="245">que vem de frente</text>

            <path d="M448 328 L 402 328" stroke="#87a9bd" stroke-width="1.5" fill="none" marker-end="url(#s)"/>
            <text class="rotp" x="458" y="323" style="fill:#7bd389">a célula que devolve UM ponto</text>
            <text class="rotp" x="458" y="345" style="fill:#7bd389">da imagem — um pixel</text>
        </g>
    </g>

    <!-- ══ Baixo-esquerda: poucas facetas × muitas facetas ════════════════ -->
    <g transform="translate(46,520)">
        <rect class="painel" x="0" y="0" width="640" height="212" rx="16"/>
        <text class="rot" x="24" y="38">QUANTAS FACETAS?</text>

        <g transform="translate(150,126)">
            <circle cx="0" cy="0" r="52" fill="url(#cupula)"/>
            <circle cx="0" cy="0" r="52" fill="url(#hexGrosso)"/>
            <text class="rotp" x="0" y="80" text-anchor="middle" style="fill:#ff8f6b">poucas: a presa é um borrão</text>
        </g>

        <path d="M236 126 L 292 126" stroke="#87a9bd" stroke-width="3" fill="none" marker-end="url(#s)"/>

        <g transform="translate(410,126)">
            <circle cx="0" cy="0" r="52" fill="url(#cupula)"/>
            <circle cx="0" cy="0" r="52" fill="url(#hexFino)"/>
            <text class="rotp" x="0" y="80" text-anchor="middle" style="fill:#7bd389">30 mil: a presa tem contorno</text>
        </g>
    </g>

    <!-- ══ Baixo-direita: o campo de visão ════════════════════════════════ -->
    <g transform="translate(714,520)">
        <rect class="painel" x="0" y="0" width="640" height="212" rx="16"/>
        <text class="rot" x="24" y="38">O CAMPO DE VISÃO</text>
        <text class="rotp" x="24" y="60">as duas cúpulas juntas quase não deixam ponto cego</text>

        <!-- humano: um cone estreito à frente; o resto é cego -->
        <g transform="translate(160,132)">
            <circle cx="0" cy="0" r="52" fill="none" stroke="#33627f" stroke-width="1.5" stroke-dasharray="5 5"/>
            <path d="M0 0 L 26 -45 A 52 52 0 0 1 26 45 Z" fill="#ff8f6b" opacity="0.45"/>
            <circle cx="0" cy="0" r="8" fill="#87a9bd"/>
            <text class="rotp" x="0" y="76" text-anchor="middle" style="fill:#ff8f6b">nós: cerca de 120°</text>
        </g>

        <!-- libélula: quase 360° -->
        <g transform="translate(430,132)">
            <path d="M0 -52 A 52 52 0 1 1 -15 -49 L 0 0 Z" fill="#7bd389" opacity="0.4"/>
            <circle cx="0" cy="0" r="52" fill="none" stroke="#7bd389" stroke-width="1.5"/>
            <circle cx="0" cy="0" r="8" fill="#7bd389"/>
            <text class="rotp" x="0" y="76" text-anchor="middle" style="fill:#7bd389">a libélula: quase 360°</text>
        </g>

        <text class="rotp" x="540" y="126">ela vê você</text>
        <text class="rotp" x="540" y="148">chegar por trás</text>
    </g>

    <text class="rotp" x="46" y="768" font-size="15">
        A libélula caça em pleno voo e acerta a presa em nove de cada dez investidas — nenhum predador chega perto disso.
    </text>
</svg>
