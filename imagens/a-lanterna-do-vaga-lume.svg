<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A Lanterna do Vaga-Lume — escamas inclinadas que deixam a luz sair</title>
    <desc id="desc">Numa superfície lisa, boa parte da luz gerada dentro do corpo bate no limite e volta
        para dentro (reflexão interna total): fica presa. As escaminhas inclinadas e desalinhadas da
        lanterna do vaga-lume mudam o ângulo com que a luz chega à saída — e mais luz escapa. Há uma
        inclinação ótima. Engenheiros copiaram a ideia para os LEDs.</desc>

    <defs>
        <linearGradient id="noite" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#101a30"/>
            <stop offset="1" stop-color="#060a16"/>
        </linearGradient>
        <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#e8ff7a" stop-opacity="0.85"/>
            <stop offset="1" stop-color="#e8ff7a" stop-opacity="0"/>
        </radialGradient>

        <marker id="s-e8ff7a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="12" markerHeight="12"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#e8ff7a"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#f0f7d8; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#e2edc4; font-size:18px; font-weight:700; }
        .rotp { fill:#9aa982; font-size:14px; }
        .painel { fill:#16203a; stroke:#4d5a75; stroke-width:2; }
    </style>

    <rect width="1400" height="800" fill="url(#noite)"/>

    <text class="cab" x="46" y="54">A LANTERNA DO VAGA-LUME</text>
    <text class="rotp" x="46" y="84" font-size="17">Fazer luz é fácil. Difícil é deixá-la sair.</text>

    <!-- ══ O vaga-lume ════════════════════════════════════════════════════ -->
    <g transform="translate(230,300)">
        <circle cx="30" cy="40" r="120" fill="url(#glow)"/>
        <!-- corpo -->
        <ellipse cx="-70" cy="-10" rx="26" ry="20" fill="#3b4a2c"/>
        <ellipse cx="-24" cy="0" rx="34" ry="24" fill="#4c5f38"/>
        <ellipse cx="34" cy="16" rx="46" ry="30" fill="#e8ff7a"/>
        <path d="M-96 -22 L -120 -46 M-88 -26 L -104 -54" stroke="#3b4a2c"
              stroke-width="3" stroke-linecap="round"/>
        <path d="M-40 -22 C -10 -70, 60 -66, 76 -30 C 40 -20, -6 -14, -40 -22 Z"
              fill="#8ea36a" opacity="0.55"/>
        <text class="rot" x="10" y="96" text-anchor="middle" font-size="16" style="fill:#e8ff7a">
            LUZ FRIA
        </text>
        <text class="rotp" x="10" y="118" text-anchor="middle">quase nada vira calor</text>
    </g>

    <!-- lupa na lanterna -->
    <circle cx="264" cy="316" r="40" fill="none" stroke="#e8ff7a" stroke-width="2.5"/>
    <path d="M292 344 C 360 400, 420 408, 470 404" stroke="#e8ff7a" stroke-width="2"
          stroke-dasharray="7 6" fill="none" marker-end="url(#s-e8ff7a)"/>

    <!-- ══ Painel: superfície LISA — a luz volta para dentro ══════════════ -->
    <g transform="translate(500,130)">
        <rect class="painel" x="0" y="0" width="410" height="300" rx="16"/>
        <text class="rot" x="24" y="38" style="fill:#ff8f6b">SUPERFÍCIE LISA</text>
        <text class="rotp" x="24" y="60">a luz bate na saída e volta: fica presa</text>

        <!-- o "limite" entre o corpo e o ar -->
        <rect x="24" y="150" width="362" height="10" rx="3" fill="#8ea36a"/>
        <text class="rotp" x="24" y="140" font-size="12">ar</text>
        <text class="rotp" x="24" y="182" font-size="12">dentro do corpo</text>

        <!-- raios que batem e voltam (reflexão interna total) -->
        <g stroke="#e8ff7a" stroke-width="3" fill="none">
            <path d="M70 250 L 140 158"/>
            <path d="M140 158 L 210 250" marker-end="url(#s-e8ff7a)"/>
            <path d="M200 250 L 268 158"/>
            <path d="M268 158 L 336 250" marker-end="url(#s-e8ff7a)"/>
        </g>
        <!-- só um raio raro consegue sair -->
        <g stroke="#e8ff7a" stroke-width="3" fill="none" opacity="0.9">
            <path d="M310 250 L 348 154 L 360 96" marker-end="url(#s-e8ff7a)"/>
        </g>

        <text class="rot" x="24" y="284" font-size="16" style="fill:#ff8f6b">
            quase tudo volta para dentro
        </text>
    </g>

    <!-- ══ Painel: escamas INCLINADAS — a luz escapa ══════════════════════ -->
    <g transform="translate(950,130)">
        <rect class="painel" x="0" y="0" width="410" height="300" rx="16"/>
        <text class="rot" x="24" y="38" style="fill:#7bd389">ESCAMAS INCLINADAS</text>
        <text class="rotp" x="24" y="60">o ângulo de chegada muda — e a luz sai</text>

        <!-- a saída, agora dentada e desalinhada -->
        <g fill="#8ea36a">
            <path d="M24 150 l 30 -22 l 12 22 Z"/>
            <path d="M70 150 l 34 -26 l 12 26 Z"/>
            <path d="M120 150 l 30 -20 l 12 20 Z"/>
            <path d="M166 150 l 36 -28 l 12 28 Z"/>
            <path d="M218 150 l 30 -22 l 12 22 Z"/>
            <path d="M264 150 l 34 -26 l 12 26 Z"/>
            <path d="M314 150 l 30 -24 l 12 24 Z"/>
            <rect x="24" y="150" width="362" height="10" rx="3"/>
        </g>

        <!-- os mesmos raios de antes — agora escapam -->
        <g stroke="#e8ff7a" stroke-width="3" fill="none">
            <path d="M70 250 L 140 142 L 168 96" marker-end="url(#s-e8ff7a)"/>
            <path d="M200 250 L 268 140 L 296 98" marker-end="url(#s-e8ff7a)"/>
            <path d="M320 250 L 352 146 L 372 104" marker-end="url(#s-e8ff7a)"/>
        </g>

        <text class="rot" x="24" y="284" font-size="16" style="fill:#7bd389">
            muito mais luz escapa
        </text>
    </g>

    <!-- ══ Painel: existe uma inclinação ótima ════════════════════════════ -->
    <g transform="translate(500,470)">
        <rect class="painel" x="0" y="0" width="860" height="270" rx="16"/>
        <text class="rot" x="24" y="40">HÁ UMA INCLINAÇÃO ÓTIMA</text>
        <text class="rotp" x="24" y="62">pouca inclinação quase não ajuda; muita, a luz se perde de lado</text>

        <!-- curva do brilho em função da inclinação -->
        <g transform="translate(60,110)">
            <path d="M0 120 H 560" stroke="#4d5a75" stroke-width="2"/>
            <path d="M0 120 V 0" stroke="#4d5a75" stroke-width="2"/>
            <text class="rotp" x="560" y="144" text-anchor="end" font-size="12">inclinação das escamas →</text>
            <text class="rotp" x="-46" y="10" font-size="12">brilho</text>

            <!-- a curva: sobe, atinge o máximo, cai -->
            <path d="M0 112 C 90 96, 160 40, 260 18 C 360 -4, 460 60, 560 106"
                  fill="none" stroke="#e8ff7a" stroke-width="4"/>

            <!-- o ponto ótimo -->
            <circle cx="270" cy="16" r="8" fill="#7bd389"/>
            <path d="M270 26 L 270 120" stroke="#7bd389" stroke-width="2" stroke-dasharray="6 5"/>
            <text class="rot" x="270" y="-6" text-anchor="middle" font-size="15" style="fill:#7bd389">
                brilho máximo
            </text>

            <text class="rotp" x="30" y="104" font-size="12" style="fill:#ff8f6b">quase lisa</text>
            <text class="rotp" x="530" y="100" font-size="12" text-anchor="end" style="fill:#ff8f6b">
                inclinada demais
            </text>
        </g>
    </g>

    <!-- ══ O LED que copiou ═══════════════════════════════════════════════ -->
    <g transform="translate(60,520)">
        <rect class="painel" x="0" y="0" width="400" height="220" rx="16"/>
        <text class="rot" x="24" y="40">O LED COPIOU</text>

        <g transform="translate(96,130)">
            <path d="M-40 40 L -40 -10 C -40 -46, 40 -46, 40 -10 L 40 40 Z" fill="#3a4a66"/>
            <path d="M-40 -10 C -40 -46, 40 -46, 40 -10" fill="#e8ff7a" opacity="0.9"/>
            <g fill="#8ea36a">
                <path d="M-40 -12 l 14 -10 l 6 10 Z"/><path d="M-14 -22 l 14 -10 l 6 10 Z"/>
                <path d="M12 -20 l 14 -10 l 6 10 Z"/>
            </g>
            <path d="M-20 40 L -20 66 M20 40 L 20 66" stroke="#8fa0bd" stroke-width="4"/>
            <g stroke="#e8ff7a" stroke-width="2.5" fill="none">
                <path d="M-30 -40 L -46 -70" marker-end="url(#s-e8ff7a)"/>
                <path d="M0 -46 L 0 -78" marker-end="url(#s-e8ff7a)"/>
                <path d="M30 -40 L 46 -70" marker-end="url(#s-e8ff7a)"/>
            </g>
        </g>

        <text class="rotp" x="190" y="120">a mesma superfície</text>
        <text class="rotp" x="190" y="142">picotada no vidro</text>
        <text class="rotp" x="190" y="164">do LED: mais brilho</text>
        <text class="rotp" x="190" y="186">com a mesma energia</text>
    </g>
</svg>
