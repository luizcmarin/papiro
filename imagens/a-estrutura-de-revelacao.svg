<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A estrutura do livro de Revelação — 16 visões e o rolo que se dobra sobre si mesmo</title>
    <desc id="desc">Depois da introdução (Revelação 1:1-9), o livro pode ser encarado como 16 visões. Elas não
        formam uma fila: o Cordeiro recebe um rolo de sete selos e, ao ser aberto o sétimo selo, não vem um
        evento — vêm sete trombetas, e as seis primeiras são a 5ª visão. A sétima trombeta, por sua vez,
        anuncia o terceiro ai: a entrada do Reino de Jeová e do seu Cristo, na 6ª visão. A espiral desenha
        esse encaixe: a volta de fora são os sete selos e, no sétimo, a linha não termina — entra para dentro
        e vira as sete trombetas, chegando ao miolo, o Reino. As sete tigelas são outra série de sete, na 10ª
        visão, e não saem de dentro dos selos.</desc>

    <defs>
        <linearGradient id="fundo" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f2eefb"/>
            <stop offset="1" stop-color="#e0d9f3"/>
        </linearGradient>
        <marker id="st" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#6b46c1"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#2e2352; font-size:28px; font-weight:800; letter-spacing:1.1px; }
        .rot  { fill:#6b46c1; font-size:18px; font-weight:700; }
        .rotp { fill:#635a83; font-size:13px; }
        .painel { fill:#ffffff; stroke:#cdc3ea; stroke-width:2; }
        .selo   { fill:none; stroke:#3aa0ff; stroke-width:24; stroke-linecap:round; }
        .tromb  { fill:none; stroke:#a679e8; stroke-width:24; stroke-linecap:round; }
        .num    { fill:#ffffff; font-size:12px; font-weight:800; text-anchor:middle; dominant-baseline:central; }
        .lin    { fill:#463b6b; font-size:12.5px; }
        .linn   { fill:#6b46c1; font-size:12.5px; font-weight:800; }
        .ouro   { fill:#b07d10; }
        .ok     { fill:#2f8f5c; }
    </style>

    <rect width="1400" height="800" fill="url(#fundo)"/>

    <text class="cab" x="46" y="54">A ESTRUTURA DE REVELAÇÃO — O ROLO QUE SE DOBRA</text>
    <text class="rotp" x="46" y="84" font-size="16">
        O livro não é uma fila de símbolos. Depois da introdução (1:1-9), são 16 visões — e algumas não vêm DEPOIS das outras: vêm DENTRO delas.
    </text>
    <g transform="translate(46,112)">
        <rect class="painel" width="390" height="380" rx="16"/>
        <text class="rot" x="22" y="36">AS 16 VISÕES</text>
        <text class="rotp" x="22" y="56">as que se DESDOBRAM estão em roxo</text>
        <text class="lin" x="24" y="78" font-weight="800">1ª</text>
        <text class="lin" x="48" y="78">1:10–3:22</text>
        <text class="lin" x="132" y="78" font-size="11.5" fill="#7d749b">mensagens às sete congregações</text>
        <text class="lin" x="24" y="97" font-weight="800">2ª</text>
        <text class="lin" x="48" y="97">4:1–5:14</text>
        <text class="lin" x="132" y="97" font-size="11.5" fill="#7d749b">o trono; o rolo é entregue ao Cordeiro</text>
        <text class="lin" x="24" y="116" font-weight="800">3ª</text>
        <text class="lin" x="48" y="116">6:1-17</text>
        <text class="lin" x="132" y="116" font-size="11.5" fill="#7d749b">os seis primeiros selos; os quatro cavaleiros</text>
        <text class="lin" x="24" y="135" font-weight="800">4ª</text>
        <text class="lin" x="48" y="135">7:1-17</text>
        <text class="lin" x="132" y="135" font-size="11.5" fill="#7d749b">os 144.000 selados; a grande multidão</text>
        <rect x="18" y="142" width="354" height="19" rx="4" fill="#f3ecff"/>
        <text class="linn" x="24" y="154" font-weight="800">5ª</text>
        <text class="linn" x="48" y="154">8:1–9:21</text>
        <text class="lin" x="132" y="154" font-size="11.5" fill="#7d749b">o 7º selo abre: seis toques de trombeta</text>
        <rect x="18" y="161" width="354" height="19" rx="4" fill="#f3ecff"/>
        <text class="linn" x="24" y="173" font-weight="800">6ª</text>
        <text class="linn" x="48" y="173">10:1–11:19</text>
        <text class="lin" x="132" y="173" font-size="11.5" fill="#7d749b">o pequeno rolo; a 7ª trombeta: o Reino</text>
        <text class="lin" x="24" y="192" font-weight="800">7ª</text>
        <text class="lin" x="48" y="192">12:1-17</text>
        <text class="lin" x="132" y="192" font-size="11.5" fill="#7d749b">o nascimento do Reino; Satanás lançado</text>
        <text class="lin" x="24" y="211" font-weight="800">8ª</text>
        <text class="lin" x="48" y="211">13:1-18</text>
        <text class="lin" x="132" y="211" font-size="11.5" fill="#7d749b">a fera do mar; a fera de dois chifres</text>
        <text class="lin" x="24" y="230" font-weight="800">9ª</text>
        <text class="lin" x="48" y="230">14:1-20</text>
        <text class="lin" x="132" y="230" font-size="11.5" fill="#7d749b">os 144.000 no Monte Sião; a ceifa</text>
        <text class="lin" x="24" y="249" font-weight="800">10ª</text>
        <text class="lin" x="48" y="249">15:1–16:21</text>
        <text class="lin" x="132" y="249" font-size="11.5" fill="#7d749b">as sete tigelas da ira</text>
        <text class="lin" x="24" y="268" font-weight="800">11ª</text>
        <text class="lin" x="48" y="268">17:1-18</text>
        <text class="lin" x="132" y="268" font-size="11.5" fill="#7d749b">Babilônia, a Grande, e a fera escarlate</text>
        <text class="lin" x="24" y="287" font-weight="800">12ª</text>
        <text class="lin" x="48" y="287">18:1–19:10</text>
        <text class="lin" x="132" y="287" font-size="11.5" fill="#7d749b">a queda de Babilônia; o casamento do Cordeiro</text>
        <text class="lin" x="24" y="306" font-weight="800">13ª</text>
        <text class="lin" x="48" y="306">19:11-21</text>
        <text class="lin" x="132" y="306" font-size="11.5" fill="#7d749b">Jesus lidera os exércitos celestiais</text>
        <text class="lin" x="24" y="325" font-weight="800">14ª</text>
        <text class="lin" x="48" y="325">20:1-10</text>
        <text class="lin" x="132" y="325" font-size="11.5" fill="#7d749b">Satanás no abismo; o Reinado Milenar</text>
        <text class="lin" x="24" y="344" font-weight="800">15ª</text>
        <text class="lin" x="48" y="344">20:11–21:8</text>
        <text class="lin" x="132" y="344" font-size="11.5" fill="#7d749b">a ressurreição; novo céu e nova terra</text>
        <text class="lin" x="24" y="363" font-weight="800">16ª</text>
        <text class="lin" x="48" y="363">21:9–22:5</text>
        <text class="lin" x="132" y="363" font-size="11.5" fill="#7d749b">a Nova Jerusalém; “Vem!”</text>
    </g>

