    <g transform="translate(46,532)">
        <g>
            <rect class="painel" width="420" height="224" rx="16"/>
            <text class="rot" x="24" y="42">POR QUE ISSO CONFUNDE</text>
            <text class="rotp" x="24" y="76" font-size="14">Quem lê em fila espera que o sétimo selo traga um</text>
            <text class="rotp" x="24" y="98" font-size="14">acontecimento — e acha que não aconteceu nada.</text>
            <text class="rotp" x="24" y="128" font-size="14">Mas o sétimo selo é a própria porta: dele saem as</text>
            <text class="rotp" x="24" y="150" font-size="14">sete trombetas. O livro não corta; ele encaixa.</text>
            <text class="rotp" x="24" y="184" font-size="14" font-style="italic">Duas visões se desdobram: a 5ª e a 6ª.</text>
        </g>
        <g transform="translate(444,0)">
            <rect class="painel" width="420" height="224" rx="16" fill="#f6f1ff" stroke="#c4a6f0"/>
            <text class="rot" x="24" y="42">NEM TODO “SETE” ENCAIXA</text>
            <text class="rotp" x="24" y="76" font-size="14">As sete tigelas da ira também são sete — mas são</text>
            <text class="rotp" x="24" y="98" font-size="14">a 10ª visão, e NÃO saem de dentro dos selos.</text>
            <text class="rotp" x="24" y="128" font-size="14">Por isso elas ficam fora da espiral: reconhecer o</text>
            <text class="rotp" x="24" y="150" font-size="14">que encaixa é tão importante quanto o que não.</text>
            <text class="rotp" x="24" y="184" font-size="14" font-style="italic">— Revelação 15:1–16:21</text>
        </g>
        <g transform="translate(888,0)">
            <rect class="painel" width="420" height="224" rx="16" fill="#eef8f2" stroke="#a9dcc0"/>
            <text class="rot ok" x="24" y="42">O QUE A PLANTA REVELA</text>
            <text class="rotp" x="24" y="76" font-size="14">O livro dedica 62 versículos a conselho prático às</text>
            <text class="rotp" x="24" y="98" font-size="14">sete congregações — e 17 aos quatro cavaleiros.</text>
            <text class="rotp" x="24" y="128" font-size="14">Tudo converge para um miolo: o Reino (11:15) e a</text>
            <text class="rotp" x="24" y="150" font-size="14">Nova Jerusalém, que fecha com um convite: “Vem!”</text>
            <text class="ok" x="24" y="192" font-size="17" font-weight="800">Arquitetura assim não se rabisca: projeta-se.</text>
        </g>
    </g>
</svg>
