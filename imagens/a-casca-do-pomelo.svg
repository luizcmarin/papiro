<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A Casca do Pomelo — uma espuma de densidade graduada</title>
    <desc id="desc">O pomelo cai de mais de dez metros e a casca quase nunca racha. Em corte, a casca é
        uma espuma cujos poros crescem de fora para dentro: firme na superfície, cada vez mais macia
        conforme se aproxima da polpa. A força do impacto não bate de uma vez: ela é gasta camada
        por camada, e o pico que chega à polpa cai abaixo do que ela aguenta.</desc>

    <defs>
        <linearGradient id="fundo" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f7f4e6"/>
            <stop offset="1" stop-color="#e6e0c8"/>
        </linearGradient>
        <linearGradient id="casca" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#cddc5c"/>
            <stop offset="1" stop-color="#a8bc3c"/>
        </linearGradient>

        <marker id="s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="11" markerHeight="11"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/>
        </marker>
        <marker id="sp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/>
        </marker>
        <marker id="ini" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="8" markerHeight="8"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M10 0 L0 5 L10 10 z" fill="context-stroke"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#3f4415; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#5c6420; font-size:18px; font-weight:700; }
        .rotp { fill:#87904c; font-size:14px; }
        .painel { fill:#fffdf3; stroke:#c3c98a; stroke-width:2; }
    </style>

    <rect width="1400" height="800" fill="url(#fundo)"/>

    <text class="cab" x="46" y="54">A CASCA DO POMELO</text>
    <text class="rotp" x="46" y="84" font-size="17">A maior fruta cítrica cai de dez metros de altura — e não racha.</text>

    <!-- ══ Esquerda: a queda ══════════════════════════════════════════════ -->
    <g transform="translate(46,112)">
        <rect class="painel" x="0" y="0" width="366" height="380" rx="16"/>
        <text class="rot" x="24" y="38">A QUEDA</text>

        <!-- a árvore -->
        <g>
            <path d="M60 300 V 90" stroke="#8a6f4a" stroke-width="14"/>
            <ellipse cx="60" cy="82" rx="52" ry="34" fill="#5f9e46"/>
            <ellipse cx="104" cy="102" rx="34" ry="22" fill="#4e8f3e"/>
        </g>

        <!-- a régua dos 10 m -->
        <path d="M182 92 V 300" stroke="#5c6420" stroke-width="2"
              marker-start="url(#ini)" marker-end="url(#sp)"/>
        <text class="rot" x="196" y="200" font-size="17">10 m</text>
        <text class="rotp" x="196" y="222">de queda livre</text>

        <!-- a fruta caindo (três fantasmas + a real) -->
        <g>
            <circle cx="118" cy="120" r="20" fill="url(#casca)" opacity="0.3"/>
            <circle cx="118" cy="176" r="24" fill="url(#casca)" opacity="0.5"/>
            <circle cx="118" cy="238" r="28" fill="url(#casca)"
                    stroke="#7d8f28" stroke-width="2" opacity="0.9"/>
        </g>

        <!-- o chão e a batida -->
        <rect x="24" y="300" width="318" height="24" rx="6" fill="#b9a887"/>
        <g stroke="#c0392b" stroke-width="3" fill="none">
            <path d="M96 292 L 78 272"/><path d="M118 292 L 118 266"/><path d="M140 292 L 158 272"/>
        </g>

        <text class="rot" x="24" y="352" font-size="16" style="fill:#1f7a3d">E a fruta continua inteira.</text>
    </g>

    <!-- ══ Meio: o corte da casca ═════════════════════════════════════════ -->
    <g transform="translate(432,112)">
        <rect class="painel" x="0" y="0" width="500" height="380" rx="16"/>
        <text class="rot" x="24" y="38">A CASCA, EM CORTE</text>
        <text class="rotp" x="24" y="60">os poros vão crescendo de fora para dentro</text>

        <!-- a batida chegando -->
        <path d="M250 82 V 108" stroke="#c0392b" stroke-width="5" fill="none" marker-end="url(#s)"/>
        <text class="rot" x="266" y="98" font-size="15" style="fill:#c0392b">o impacto</text>

        <!-- camada 1: casca externa, fina e dura -->
        <g transform="translate(40,116)">
            <rect x="0" y="0" width="420" height="34" rx="4" fill="#a8bc3c" stroke="#7d8f28" stroke-width="1.5"/>
            <text class="rotp" x="14" y="22" font-size="13" style="fill:#3f4415" font-weight="700">
                a superfície: dura e fina
            </text>
        </g>

        <!-- camada 2 a 4: espuma com poros crescentes -->
        <g transform="translate(40,152)">
            <rect x="0" y="0" width="420" height="52" fill="#e5efb8" stroke="#c3c98a" stroke-width="1.5"/>
            <g fill="#fffdf3" stroke="#c3c98a" stroke-width="1">
                <circle cx="30" cy="26" r="8"/><circle cx="72" cy="26" r="8"/><circle cx="114" cy="26" r="8"/>
                <circle cx="156" cy="26" r="8"/><circle cx="198" cy="26" r="8"/><circle cx="240" cy="26" r="8"/>
                <circle cx="282" cy="26" r="8"/><circle cx="324" cy="26" r="8"/><circle cx="366" cy="26" r="8"/>
                <circle cx="404" cy="26" r="8"/>
            </g>
        </g>
        <g transform="translate(40,206)">
            <rect x="0" y="0" width="420" height="68" fill="#eef4cd" stroke="#c3c98a" stroke-width="1.5"/>
            <g fill="#fffdf3" stroke="#c3c98a" stroke-width="1">
                <circle cx="38" cy="34" r="15"/><circle cx="94" cy="34" r="15"/><circle cx="150" cy="34" r="15"/>
                <circle cx="206" cy="34" r="15"/><circle cx="262" cy="34" r="15"/><circle cx="318" cy="34" r="15"/>
                <circle cx="374" cy="34" r="15"/>
            </g>
        </g>
        <g transform="translate(40,276)">
            <rect x="0" y="0" width="420" height="84" fill="#f6f9e4" stroke="#c3c98a" stroke-width="1.5"/>
            <g fill="#fffdf3" stroke="#c3c98a" stroke-width="1">
                <circle cx="52" cy="42" r="24"/><circle cx="130" cy="42" r="24"/><circle cx="208" cy="42" r="24"/>
                <circle cx="286" cy="42" r="24"/><circle cx="364" cy="42" r="24"/>
            </g>
        </g>

        <!-- a polpa, embaixo -->
        <g transform="translate(40,360)">
            <rect x="0" y="-2" width="420" height="6" fill="#e88fa0"/>
        </g>

        <!-- a seta da graduação, à direita -->
        <path d="M484 122 V 352" stroke="#5c6420" stroke-width="2" fill="none" marker-end="url(#sp)"/>
        <text class="rotp" x="466" y="238" transform="rotate(-90,466,238)" text-anchor="middle" font-size="13">
            cada vez mais macia
        </text>

        <text class="rotp" x="24" y="374" style="fill:#c25a72">a polpa</text>
    </g>

    <!-- ══ Direita: o pico da força ═══════════════════════════════════════ -->
    <g transform="translate(952,112)">
        <rect class="painel" x="0" y="0" width="402" height="380" rx="16"/>
        <text class="rot" x="24" y="38">A FORÇA QUE CHEGA À POLPA</text>
        <text class="rotp" x="24" y="60">o mesmo tombo, com casca e sem casca</text>

        <g transform="translate(56,96)">
            <!-- eixos -->
            <path d="M0 0 V 216 H 320" fill="none" stroke="#c3c98a" stroke-width="2"/>
            <text class="rotp" x="-12" y="8" text-anchor="end" font-size="13">força</text>
            <text class="rotp" x="316" y="238" text-anchor="end" font-size="13">tempo</text>

            <!-- o limite que a polpa aguenta -->
            <path d="M0 150 H 320" stroke="#c0392b" stroke-width="2" stroke-dasharray="7 6"/>
            <text class="rotp" x="318" y="142" text-anchor="end" font-size="13" style="fill:#c0392b">
                o que a polpa aguenta
            </text>

            <!-- sem espuma: um pico altíssimo e curto -->
            <path d="M0 216 L 60 214 L 84 8 L 108 214 L 320 214"
                  fill="none" stroke="#c0392b" stroke-width="3"/>
            <text class="rotp" x="92" y="-4" text-anchor="middle" font-size="13" style="fill:#c0392b">
                sem a espuma: racha
            </text>

            <!-- com a espuma graduada: uma colina baixa e longa -->
            <path d="M0 216 C 60 214, 80 190, 120 176 C 170 158, 200 172, 250 200 C 280 212, 300 214, 320 214"
                  fill="none" stroke="#2f8f5c" stroke-width="3.5"/>
            <text class="rotp" x="168" y="196" font-size="13" style="fill:#1f7a3d">com a espuma: baixa e espalhada</text>
        </g>

        <text class="rotp" x="24" y="352">A casca não devolve a força: ela a gasta ao longo do tempo.</text>
    </g>

    <!-- ══ Rodapé ═════════════════════════════════════════════════════════ -->
    <g transform="translate(46,520)">
        <rect class="painel" x="0" y="0" width="1308" height="212" rx="16"/>
        <text class="rot" x="24" y="38">POR QUE A GRADUAÇÃO IMPORTA</text>

        <g transform="translate(30,64)">
            <rect x="0" y="0" width="404" height="118" rx="12" fill="#f6f9e4" stroke="#c3c98a" stroke-width="1.5"/>
            <text class="rot" x="20" y="32" font-size="16">Se fosse tudo duro</text>
            <text class="rotp" x="20" y="60">a casca devolveria o choque de uma vez —</text>
            <text class="rotp" x="20" y="84">e rachava, como uma louça que cai</text>
            <text class="rotp" x="20" y="104">no chão de cerâmica.</text>
        </g>

        <g transform="translate(452,64)">
            <rect x="0" y="0" width="404" height="118" rx="12" fill="#f6f9e4" stroke="#c3c98a" stroke-width="1.5"/>
            <text class="rot" x="20" y="32" font-size="16">Se fosse tudo mole</text>
            <text class="rotp" x="20" y="60">a casca afundaria até o fim e a polpa</text>
            <text class="rotp" x="20" y="84">levaria o baque assim mesmo —</text>
            <text class="rotp" x="20" y="104">não sobraria espuma para gastar.</text>
        </g>

        <g transform="translate(874,64)">
            <rect x="0" y="0" width="404" height="118" rx="12" fill="#eef7f0" stroke="#2f8f5c" stroke-width="2"/>
            <text class="rot" x="20" y="32" font-size="16" style="fill:#1f7a3d">Firme fora, macia dentro</text>
            <text class="rotp" x="20" y="60">a força é freada aos poucos, camada por</text>
            <text class="rotp" x="20" y="84">camada. É essa receita que os engenheiros</text>
            <text class="rotp" x="20" y="104">copiam em capacetes e embalagens.</text>
        </g>
    </g>

    <text class="rotp" x="46" y="768" font-size="15">
        A fruta cai, quica, rola — e o que estava dentro dela chega ao chão intacto, pronto para virar outra árvore.
    </text>
</svg>
