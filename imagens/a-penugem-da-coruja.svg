<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A Penugem da Coruja — o voo que não faz barulho</title>
    <desc id="desc">Numa asa comum, o ar sai do bordo de fuga num turbilhão grande, que vira ruído. Na asa
        da coruja, o pente do bordo de ataque e as franjas do bordo de fuga quebram o ar em turbilhões
        pequenos e defasados: as ondas de som chegam em oposição de fase e se cancelam.</desc>

    <defs>
        <linearGradient id="noite" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#1b2440"/>
            <stop offset="1" stop-color="#0b1020"/>
        </linearGradient>

        <marker id="s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="12" markerHeight="12"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#f2ecdf; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#e6dcc8; font-size:18px; font-weight:700; }
        .rotp { fill:#a99e88; font-size:14px; }
        .painel { fill:#161f37; stroke:#4a5570; stroke-width:2; }
    </style>

    <rect width="1400" height="800" fill="url(#noite)"/>
    <circle cx="1230" cy="130" r="54" fill="#f5edd6" opacity="0.9"/>
    <circle cx="1210" cy="118" r="46" fill="#0b1020" opacity="0.55"/>

    <text class="cab" x="46" y="54">A PENUGEM DA CORUJA</text>
    <text class="rotp" x="46" y="84" font-size="17">O ar não é silenciado: ele é picado em pedaços que se anulam.</text>

    <!-- ══ Painel: asa comum — um turbilhão grande, barulhento ════════════ -->
    <g transform="translate(60,130)">
        <rect class="painel" x="0" y="0" width="620" height="300" rx="16"/>
        <text class="rot" x="24" y="38" style="fill:#ff8f6b">ASA COMUM</text>
        <text class="rotp" x="24" y="60">o ar sai do bordo num turbilhão só — e ele ruge</text>

        <!-- perfil liso -->
        <path d="M60 170 C 140 130, 300 128, 400 158 L 400 178 C 300 190, 140 196, 60 170 Z"
              fill="#c9b189"/>

        <!-- fluxo entrando -->
        <g stroke="#7fd4ff" stroke-width="3" fill="none">
            <path d="M24 148 L 56 152" marker-end="url(#s)"/>
            <path d="M24 186 L 56 182" marker-end="url(#s)"/>
        </g>

        <!-- um vórtice grande saindo do bordo de fuga -->
        <g stroke="#ff8f6b" stroke-width="3.5" fill="none">
            <path d="M404 168 C 452 130, 522 158, 496 208 C 474 250, 412 232, 424 186"/>
        </g>

        <!-- o ruído: ondas grandes, todas em fase -->
        <text class="rot" x="24" y="240" font-size="16" style="fill:#ff8f6b">RUÍDO: as ondas se somam</text>
        <g stroke="#ff8f6b" stroke-width="2.5" fill="none" opacity="0.9">
            <path d="M24 268 q 22 -20 44 0 t 44 0 t 44 0 t 44 0"/>
            <path d="M24 268 q 22 -20 44 0 t 44 0 t 44 0 t 44 0" transform="translate(0,10)"/>
        </g>
        <text class="rotp" x="228" y="278" font-size="13" style="fill:#ff8f6b">na mesma fase: dobram</text>
    </g>

    <!-- ══ Painel: asa da coruja — turbilhões pequenos e defasados ════════ -->
    <g transform="translate(720,130)">
        <rect class="painel" x="0" y="0" width="620" height="300" rx="16"/>
        <text class="rot" x="24" y="38" style="fill:#7bd389">ASA DA CORUJA</text>
        <text class="rotp" x="24" y="60">pente na frente, franjas atrás, veludo por cima</text>

        <!-- perfil com pente (bordo de ataque) e franjas (bordo de fuga) -->
        <path d="M60 170 C 140 130, 300 128, 400 158 L 400 178 C 300 190, 140 196, 60 170 Z"
              fill="#c9b189"/>
        <!-- pente: dentes no bordo de ataque -->
        <g fill="#e0cba6">
            <path d="M66 158 l 8 -12 l 8 12 Z"/><path d="M86 150 l 8 -12 l 8 12 Z"/>
            <path d="M106 145 l 8 -12 l 8 12 Z"/><path d="M126 140 l 8 -12 l 8 12 Z"/>
            <path d="M146 136 l 8 -12 l 8 12 Z"/><path d="M166 133 l 8 -12 l 8 12 Z"/>
        </g>
        <!-- franjas: filamentos soltos no bordo de fuga -->
        <g stroke="#e0cba6" stroke-width="2.5" stroke-linecap="round">
            <path d="M400 160 l 26 -6 M400 165 l 28 -1 M400 170 l 28 4
                     M400 175 l 26 9 M400 180 l 24 14"/>
        </g>

        <g stroke="#7fd4ff" stroke-width="3" fill="none">
            <path d="M24 148 L 56 152" marker-end="url(#s)"/>
            <path d="M24 186 L 56 182" marker-end="url(#s)"/>
        </g>

        <!-- muitos vórtices pequenos, cada um em sua fase -->
        <g stroke="#7bd389" stroke-width="2.5" fill="none">
            <circle cx="446" cy="150" r="11"/><circle cx="470" cy="168" r="9"/>
            <circle cx="452" cy="188" r="10"/><circle cx="486" cy="146" r="8"/>
            <circle cx="496" cy="192" r="9"/><circle cx="512" cy="166" r="10"/>
        </g>

        <!-- as ondas: uma invertida em relação à outra → soma zero -->
        <text class="rot" x="24" y="240" font-size="16" style="fill:#7bd389">SILÊNCIO: as ondas se anulam</text>
        <g stroke-width="2.5" fill="none">
            <path d="M24 268 q 22 -20 44 0 t 44 0 t 44 0 t 44 0" stroke="#7bd389"/>
            <path d="M24 268 q 22 20 44 0 t 44 0 t 44 0 t 44 0" stroke="#7fd4ff"/>
        </g>
        <text class="rotp" x="228" y="264" font-size="13" style="fill:#7bd389">em oposição de fase</text>
        <text class="rotp" x="228" y="284" font-size="13" style="fill:#7bd389">soma = zero</text>
    </g>

    <!-- ══ A coruja em voo ════════════════════════════════════════════════ -->
    <g transform="translate(300,610)">
        <!-- asas abertas -->
        <path d="M0 0 C -60 -60, -160 -80, -230 -50 C -170 -20, -80 0, 0 6 Z" fill="#a8916a"/>
        <path d="M0 0 C 60 -60, 160 -80, 230 -50 C 170 -20, 80 0, 0 6 Z" fill="#a8916a"/>
        <ellipse cx="0" cy="6" rx="34" ry="44" fill="#c9b189"/>
        <circle cx="-14" cy="-16" r="9" fill="#f5edd6"/><circle cx="14" cy="-16" r="9" fill="#f5edd6"/>
        <circle cx="-14" cy="-16" r="4" fill="#2b1f14"/><circle cx="14" cy="-16" r="4" fill="#2b1f14"/>
        <path d="M0 -8 L -6 0 L 6 0 Z" fill="#e0a13c"/>
        <!-- franjas no bordo de fuga das duas asas -->
        <g stroke="#e0cba6" stroke-width="2" stroke-linecap="round" opacity="0.9">
            <path d="M-210 -44 l -16 10 M-170 -30 l -14 12 M-130 -18 l -12 12 M-90 -10 l -10 12"/>
            <path d="M210 -44 l 16 10 M170 -30 l 14 12 M130 -18 l 12 12 M90 -10 l 10 12"/>
        </g>
        <text class="rot" x="0" y="92" text-anchor="middle">O RATO NÃO OUVE NADA</text>
        <text class="rotp" x="0" y="114" text-anchor="middle">e a coruja ainda escuta o próprio alvo</text>
    </g>

    <!-- ══ Painel: por que o silêncio importa ═════════════════════════════ -->
    <g transform="translate(720,480)">
        <rect class="painel" x="0" y="0" width="620" height="260" rx="16"/>
        <text class="rot" x="24" y="40">DUAS VANTAGENS DE UMA VEZ</text>

        <g transform="translate(24,74)">
            <circle cx="14" cy="14" r="14" fill="#7bd389"/>
            <text x="14" y="20" text-anchor="middle" font-size="15" font-weight="800" fill="#0b1020">1</text>
            <text class="rot" x="44" y="20" font-size="16">A presa não a escuta chegar.</text>

            <circle cx="14" cy="72" r="14" fill="#7bd389"/>
            <text x="14" y="78" text-anchor="middle" font-size="15" font-weight="800" fill="#0b1020">2</text>
            <text class="rot" x="44" y="78" font-size="16">E ela ouve a presa mesmo voando —</text>
            <text class="rotp" x="44" y="102">o próprio ruído não a cega.</text>

            <path d="M0 122 H 572" stroke="#4a5570" stroke-width="1.5"/>
            <text class="rotp" x="0" y="150">
                Ventiladores e turbinas eólicas já usam bordos serrilhados
            </text>
            <text class="rotp" x="0" y="172">pelo mesmo motivo: menos barulho, mesma potência.</text>
        </g>
    </g>
</svg>
