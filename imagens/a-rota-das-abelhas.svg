<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A Rota das Abelhas — o problema que explode</title>
    <desc id="desc">Achar a ordem mais curta para visitar todas as flores é o problema do caixeiro-viajante.
        O número de rotas possíveis não cresce: explode. Com 6 flores são 60 caminhos; com 10, mais de
        180 mil; com 20, mais rotas do que grãos de areia em todas as praias da Terra. Nenhum computador
        testa todas. A abelha não testa nenhuma: ela sai voando torto e, em poucas viagens, converge
        para uma rota quase perfeita — e ainda a refaz sozinha quando uma flor nova aparece.</desc>

    <defs>
        <linearGradient id="fundo" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f6f2e2"/>
            <stop offset="1" stop-color="#e6dfc2"/>
        </linearGradient>
        <marker id="s-8a6a1f" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#8a6a1f"/>
        </marker>
        <marker id="s-2f8f3d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#2f8f3d"/>
        </marker>

        <!-- uma flor -->
        <g id="flor">
            <g fill="#e88ab0" stroke="#c25a86" stroke-width="1.2">
                <ellipse cx="0" cy="-11" rx="5" ry="9"/>
                <ellipse cx="10" cy="-3" rx="5" ry="9" transform="rotate(72,10,-3)"/>
                <ellipse cx="6" cy="9" rx="5" ry="9" transform="rotate(144,6,9)"/>
                <ellipse cx="-6" cy="9" rx="5" ry="9" transform="rotate(216,-6,9)"/>
                <ellipse cx="-10" cy="-3" rx="5" ry="9" transform="rotate(288,-10,-3)"/>
            </g>
            <circle cx="0" cy="0" r="4.5" fill="#f0c34a"/>
        </g>
        <!-- a colmeia -->
        <g id="colmeia">
            <path d="M-20 12 L -14 -8 L 14 -8 L 20 12 Z" fill="#e8ae2a" stroke="#8a6a1f" stroke-width="2"/>
            <path d="M-14 -8 L -9 -22 L 9 -22 L 14 -8 Z" fill="#ffd964" stroke="#8a6a1f" stroke-width="2"/>
            <circle cx="0" cy="4" r="5" fill="#5a4210"/>
        </g>
    </defs>

    <style>
        .cab  { fill:#5a4210; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#8a6a1f; font-size:18px; font-weight:700; }
        .rotp { fill:#a68b52; font-size:14px; }
        .painel { fill:#fffdf4; stroke:#d9c184; stroke-width:2; }
    </style>

    <rect width="1400" height="800" fill="url(#fundo)"/>

    <text class="cab" x="46" y="54">A ROTA DAS ABELHAS</text>
    <text class="rotp" x="46" y="84" font-size="17">O problema que derruba supercomputadores — resolvido por um bicho com um milhão de neurônios.</text>

    <!-- ══ Esquerda: a rota longa × a rota curta ══════════════════════════ -->
    <g transform="translate(46,112)">
        <rect class="painel" x="0" y="0" width="812" height="380" rx="16"/>
        <text class="rot" x="24" y="38">AS MESMAS FLORES, DUAS ORDENS DIFERENTES</text>

        <!-- rota ruim -->
        <g transform="translate(30,70)">
            <rect x="0" y="0" width="368" height="288" rx="12" fill="#fdf8e6" stroke="#d9c184" stroke-width="1.5"/>
            <text class="rotp" x="16" y="26" style="fill:#c0392b" font-weight="700">uma ordem qualquer</text>

            <!-- caminho embaralhado -->
            <path d="M60 240 L 300 60 L 90 110 L 320 200 L 130 250 L 240 100 L 60 240"
                  fill="none" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="7 5"/>

            <g><use href="#colmeia" x="60" y="240"/></g>
            <use href="#flor" x="300" y="60"/><use href="#flor" x="90" y="110"/>
            <use href="#flor" x="320" y="200"/><use href="#flor" x="130" y="250"/>
            <use href="#flor" x="240" y="100"/>

            <text class="rot" x="184" y="272" text-anchor="middle" font-size="16" style="fill:#c0392b">
                vai e volta: muito voo à toa
            </text>
        </g>

        <!-- rota boa -->
        <g transform="translate(414,70)">
            <rect x="0" y="0" width="368" height="288" rx="12" fill="#f4faef" stroke="#2f8f3d" stroke-width="2"/>
            <text class="rotp" x="16" y="26" style="fill:#2f8f3d" font-weight="700">a ordem mais curta</text>

            <!-- caminho enxuto: uma volta só -->
            <path d="M60 240 L 90 110 L 240 100 L 300 60 L 320 200 L 130 250 L 60 240"
                  fill="none" stroke="#2f8f3d" stroke-width="3"/>

            <g><use href="#colmeia" x="60" y="240"/></g>
            <use href="#flor" x="300" y="60"/><use href="#flor" x="90" y="110"/>
            <use href="#flor" x="320" y="200"/><use href="#flor" x="130" y="250"/>
            <use href="#flor" x="240" y="100"/>

            <text class="rot" x="184" y="272" text-anchor="middle" font-size="16" style="fill:#2f8f3d">
                uma volta só — e volta para casa
            </text>
        </g>
    </g>

    <!-- ══ Direita: a explosão do número de rotas ═════════════════════════ -->
    <g transform="translate(886,112)">
        <rect class="painel" x="0" y="0" width="468" height="380" rx="16"/>
        <text class="rot" x="24" y="38" style="fill:#c0392b">QUANTAS ORDENS EXISTEM?</text>
        <text class="rotp" x="24" y="60">o número não cresce — ele explode</text>

        <g transform="translate(24,90)">
            <g>
                <rect x="0" y="0" width="420" height="52" rx="10" fill="#fdf8e6" stroke="#d9c184" stroke-width="1.5"/>
                <text class="rot" x="16" y="32" font-size="16">5 flores</text>
                <text class="rot" x="404" y="32" text-anchor="end" font-size="17" style="fill:#2f8f3d">12 rotas</text>
            </g>
            <g transform="translate(0,62)">
                <rect x="0" y="0" width="420" height="52" rx="10" fill="#fdf8e6" stroke="#d9c184" stroke-width="1.5"/>
                <text class="rot" x="16" y="32" font-size="16">6 flores</text>
                <text class="rot" x="404" y="32" text-anchor="end" font-size="17" style="fill:#2f8f3d">60 rotas</text>
            </g>
            <g transform="translate(0,124)">
                <rect x="0" y="0" width="420" height="52" rx="10" fill="#fdf3d4" stroke="#e8ae2a" stroke-width="1.5"/>
                <text class="rot" x="16" y="32" font-size="16">10 flores</text>
                <text class="rot" x="404" y="32" text-anchor="end" font-size="17" style="fill:#c9701e">181 440 rotas</text>
            </g>
            <g transform="translate(0,186)">
                <rect x="0" y="0" width="420" height="72" rx="10" fill="#fdeee9" stroke="#c0392b" stroke-width="2"/>
                <text class="rot" x="16" y="32" font-size="16" style="fill:#c0392b">20 flores</text>
                <text class="rot" x="404" y="32" text-anchor="end" font-size="17" style="fill:#c0392b">
                    60 000 000 000 000 000
                </text>
                <text class="rotp" x="404" y="58" text-anchor="end" font-size="13" style="fill:#c0392b">
                    e mais um punhado de zeros
                </text>
            </g>
        </g>

        <text class="rotp" x="24" y="366" font-size="13">
            Testar uma a uma é impossível — nem para um supercomputador.
        </text>
    </g>

    <!-- ══ Rodapé ═════════════════════════════════════════════════════════ -->
    <g transform="translate(46,520)">
        <rect class="painel" x="0" y="0" width="1308" height="212" rx="16"/>
        <text class="rot" x="24" y="38">ENTÃO COMO É QUE ELA ACHA?</text>

        <g transform="translate(30,64)">
            <rect x="0" y="0" width="404" height="118" rx="12" fill="#fdf8e6" stroke="#d9c184" stroke-width="1.5"/>
            <text class="rot" x="20" y="32" font-size="16">Ela não calcula. Ela tenta.</text>
            <text class="rotp" x="20" y="60">Nas primeiras viagens a abelha voa numa ordem</text>
            <text class="rotp" x="20" y="84">meio torta. A cada volta, ela troca duas flores de</text>
            <text class="rotp" x="20" y="104">lugar e guarda a versão que gastou menos voo.</text>
        </g>

        <g transform="translate(452,64)">
            <rect x="0" y="0" width="404" height="118" rx="12" fill="#f4faef" stroke="#2f8f3d" stroke-width="2"/>
            <text class="rot" x="20" y="32" font-size="16" style="fill:#2f8f3d">Em poucas viagens, chega perto do ótimo</text>
            <text class="rotp" x="20" y="60">Não é a resposta perfeita — é uma resposta</text>
            <text class="rotp" x="20" y="84">quase perfeita, achada depressa. É exatamente</text>
            <text class="rotp" x="20" y="104">assim que a computação aprendeu a atacar isso.</text>
        </g>

        <g transform="translate(874,64)">
            <rect x="0" y="0" width="404" height="118" rx="12" fill="#fdf3d4" stroke="#c9701e" stroke-width="2"/>
            <text class="rot" x="20" y="32" font-size="16" style="fill:#c9701e">E se aparecer uma flor nova?</text>
            <text class="rotp" x="20" y="60">O computador teria de refazer a conta toda.</text>
            <text class="rotp" x="20" y="84">A abelha só encaixa a flor nova na volta e segue</text>
            <text class="rotp" x="20" y="104">ajustando — sem parar de trabalhar.</text>
        </g>
    </g>

    <text class="rotp" x="46" y="768" font-size="15">
        Entregadores, caminhões e satélites resolvem esse mesmo problema todo dia — copiando o jeito da abelha.
    </text>
</svg>
