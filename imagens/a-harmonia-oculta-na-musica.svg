<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A Harmonia Oculta na Música — as frações da corda</title>
    <desc id="desc">No monocórdio, a ponte móvel divide a corda. Metade da corda dá a mesma nota uma
        oitava acima: razão de 2 para 1. Dois terços dão a quinta perfeita: 3 para 2. Quanto mais
        simples a fração, mais depressa as duas ondas voltam a coincidir — e o ouvido chama isso
        de consonância. Numa fração feia, as ondas só se reencontram muito depois, e o acorde
        arranha.</desc>

    <defs>
        <linearGradient id="fundo" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#2b1c3c"/>
            <stop offset="1" stop-color="#120b1a"/>
        </linearGradient>
        <linearGradient id="madeira" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#a5764a"/>
            <stop offset="1" stop-color="#7a5433"/>
        </linearGradient>
    </defs>

    <style>
        .cab  { fill:#f6edff; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#dccdee; font-size:18px; font-weight:700; }
        .rotp { fill:#a08fb5; font-size:14px; }
        .painel { fill:#1e1430; stroke:#5b4177; stroke-width:2; }
        .corda { stroke:#e8d6a8; stroke-width:3; fill:none; }
    </style>

    <rect width="1400" height="800" fill="url(#fundo)"/>

    <text class="cab" x="46" y="54">A HARMONIA OCULTA NA MÚSICA</text>
    <text class="rotp" x="46" y="84" font-size="17">Pitágoras não inventou a harmonia: ele mediu a corda e achou frações simples.</text>

    <!-- ══ Esquerda: o monocórdio ═════════════════════════════════════════ -->
    <g transform="translate(46,112)">
        <rect class="painel" x="0" y="0" width="812" height="380" rx="16"/>
        <text class="rot" x="24" y="38">A MESMA CORDA, DIVIDIDA</text>
        <text class="rotp" x="24" y="60">a ponte encurta a parte que vibra — e a nota sobe</text>

        <!-- 1: corda inteira -->
        <g transform="translate(40,104)">
            <rect x="0" y="14" width="600" height="18" rx="4" fill="url(#madeira)"/>
            <path class="corda" d="M0 8 H 600"/>
            <path d="M0 4 V 34 M600 4 V 34" stroke="#c9a76a" stroke-width="4"/>
            <text class="rot" x="628" y="14" font-size="16">Dó</text>
            <text class="rotp" x="628" y="34" font-size="13">a corda inteira</text>
            <text class="rotp" x="0" y="-10" font-size="13">1/1</text>
        </g>

        <!-- 2: metade -->
        <g transform="translate(40,174)">
            <rect x="0" y="14" width="600" height="18" rx="4" fill="url(#madeira)" opacity="0.4"/>
            <rect x="300" y="14" width="300" height="18" rx="4" fill="url(#madeira)"/>
            <path class="corda" d="M300 8 H 600"/>
            <path d="M0 8 H 300" stroke="#5b4177" stroke-width="3" stroke-dasharray="6 5"/>
            <path d="M300 -2 V 38" stroke="#7bd389" stroke-width="5"/>
            <text class="rotp" x="300" y="-10" text-anchor="middle" font-size="13" style="fill:#7bd389">a ponte</text>
            <text class="rot" x="628" y="14" font-size="16" style="fill:#7bd389">Dó (oitava acima)</text>
            <text class="rotp" x="628" y="34" font-size="13" style="fill:#7bd389">metade → razão 2 : 1</text>
        </g>

        <!-- 3: dois terços -->
        <g transform="translate(40,244)">
            <rect x="0" y="14" width="600" height="18" rx="4" fill="url(#madeira)" opacity="0.4"/>
            <rect x="200" y="14" width="400" height="18" rx="4" fill="url(#madeira)"/>
            <path class="corda" d="M200 8 H 600"/>
            <path d="M0 8 H 200" stroke="#5b4177" stroke-width="3" stroke-dasharray="6 5"/>
            <path d="M200 -2 V 38" stroke="#63c7e8" stroke-width="5"/>
            <text class="rot" x="628" y="14" font-size="16" style="fill:#63c7e8">Sol (a quinta)</text>
            <text class="rotp" x="628" y="34" font-size="13" style="fill:#63c7e8">2/3 → razão 3 : 2</text>
        </g>

        <!-- 4: três quartos -->
        <g transform="translate(40,314)">
            <rect x="0" y="14" width="600" height="18" rx="4" fill="url(#madeira)" opacity="0.4"/>
            <rect x="150" y="14" width="450" height="18" rx="4" fill="url(#madeira)"/>
            <path class="corda" d="M150 8 H 600"/>
            <path d="M0 8 H 150" stroke="#5b4177" stroke-width="3" stroke-dasharray="6 5"/>
            <path d="M150 -2 V 38" stroke="#ffd24d" stroke-width="5"/>
            <text class="rot" x="628" y="14" font-size="16" style="fill:#ffd24d">Fá (a quarta)</text>
            <text class="rotp" x="628" y="34" font-size="13" style="fill:#ffd24d">3/4 → razão 4 : 3</text>
        </g>
    </g>

    <!-- ══ Direita: as ondas ══════════════════════════════════════════════ -->
    <g transform="translate(886,112)">
        <rect class="painel" x="0" y="0" width="468" height="380" rx="16"/>
        <text class="rot" x="24" y="38">POR QUE UMA COMBINAÇÃO AGRADA</text>
        <text class="rotp" x="24" y="60">o que o ouvido procura é o encontro das ondas</text>

        <!-- 2:1 — encaixe perfeito -->
        <g transform="translate(24,88)">
            <rect x="0" y="0" width="420" height="132" rx="10" fill="#160e24" stroke="#7bd389" stroke-width="2"/>
            <text class="rotp" x="16" y="24" style="fill:#7bd389" font-weight="700">razão 2 : 1 — a oitava</text>

            <!-- onda grave -->
            <path d="M20 58 q 25 -20 50 0 q 25 20 50 0 q 25 -20 50 0 q 25 20 50 0
                     q 25 -20 50 0 q 25 20 50 0 q 25 -20 50 0 q 25 20 50 0"
                  fill="none" stroke="#e8d6a8" stroke-width="2.5"/>
            <!-- onda aguda: exatamente o dobro de ciclos -->
            <path d="M20 94 q 12.5 -14 25 0 q 12.5 14 25 0 q 12.5 -14 25 0 q 12.5 14 25 0
                     q 12.5 -14 25 0 q 12.5 14 25 0 q 12.5 -14 25 0 q 12.5 14 25 0
                     q 12.5 -14 25 0 q 12.5 14 25 0 q 12.5 -14 25 0 q 12.5 14 25 0
                     q 12.5 -14 25 0 q 12.5 14 25 0 q 12.5 -14 25 0 q 12.5 14 25 0"
                  fill="none" stroke="#7bd389" stroke-width="2.5"/>

            <!-- os pontos de encontro, frequentes -->
            <g fill="#7bd389">
                <circle cx="70" cy="58" r="3.5"/><circle cx="120" cy="58" r="3.5"/>
                <circle cx="170" cy="58" r="3.5"/><circle cx="220" cy="58" r="3.5"/>
                <circle cx="270" cy="58" r="3.5"/><circle cx="320" cy="58" r="3.5"/>
            </g>
            <text class="rotp" x="16" y="122" font-size="13" style="fill:#7bd389">
                dois ciclos da aguda para cada um da grave: elas sempre casam
            </text>
        </g>

        <!-- razão feia -->
        <g transform="translate(24,232)">
            <rect x="0" y="0" width="420" height="132" rx="10" fill="#160e24" stroke="#ff6b6b" stroke-width="2"/>
            <text class="rotp" x="16" y="24" style="fill:#ff6b6b" font-weight="700">razão 16 : 15 — quase a mesma nota</text>

            <path d="M20 58 q 25 -20 50 0 q 25 20 50 0 q 25 -20 50 0 q 25 20 50 0
                     q 25 -20 50 0 q 25 20 50 0 q 25 -20 50 0 q 25 20 50 0"
                  fill="none" stroke="#e8d6a8" stroke-width="2.5"/>
            <path d="M20 94 q 23.4 -20 46.8 0 q 23.4 20 46.8 0 q 23.4 -20 46.8 0 q 23.4 20 46.8 0
                     q 23.4 -20 46.8 0 q 23.4 20 46.8 0 q 23.4 -20 46.8 0 q 23.4 20 46.8 0"
                  fill="none" stroke="#ff6b6b" stroke-width="2.5"/>

            <text class="rotp" x="16" y="122" font-size="13" style="fill:#ff6b6b">
                andam quase juntas, mas nunca casam: bate e arranha
            </text>
        </g>
    </g>

    <!-- ══ Rodapé: a tabela das frações ═══════════════════════════════════ -->
    <g transform="translate(46,520)">
        <rect class="painel" x="0" y="0" width="1308" height="212" rx="16"/>
        <text class="rot" x="24" y="38">QUANTO MAIS SIMPLES A FRAÇÃO, MAIS BONITO O INTERVALO</text>

        <g transform="translate(30,64)">
            <g>
                <rect x="0" y="0" width="300" height="118" rx="12" fill="#160e24" stroke="#7bd389" stroke-width="2"/>
                <text class="cab" x="20" y="46" font-size="26" style="fill:#7bd389">2 : 1</text>
                <text class="rot" x="20" y="78" font-size="16">a Oitava</text>
                <text class="rotp" x="20" y="102">a mesma nota, só que mais fina</text>
            </g>

            <g transform="translate(320,0)">
                <rect x="0" y="0" width="300" height="118" rx="12" fill="#160e24" stroke="#63c7e8" stroke-width="2"/>
                <text class="cab" x="20" y="46" font-size="26" style="fill:#63c7e8">3 : 2</text>
                <text class="rot" x="20" y="78" font-size="16">a Quinta perfeita</text>
                <text class="rotp" x="20" y="102">2/3 da corda: a mais forte depois da oitava</text>
            </g>

            <g transform="translate(640,0)">
                <rect x="0" y="0" width="300" height="118" rx="12" fill="#160e24" stroke="#ffd24d" stroke-width="2"/>
                <text class="cab" x="20" y="46" font-size="26" style="fill:#ffd24d">4 : 3</text>
                <text class="rot" x="20" y="78" font-size="16">a Quarta</text>
                <text class="rotp" x="20" y="102">3/4 da corda</text>
            </g>

            <g transform="translate(960,0)">
                <rect x="0" y="0" width="288" height="118" rx="12" fill="#160e24" stroke="#5b4177" stroke-width="2"/>
                <text class="cab" x="20" y="46" font-size="26">5 : 4</text>
                <text class="rot" x="20" y="78" font-size="16">a Terça maior</text>
                <text class="rotp" x="20" y="102">4/5 da corda: o "sorriso" do acorde</text>
            </g>
        </g>
    </g>

    <text class="rotp" x="46" y="768" font-size="15">
        A altura do som é inversamente proporcional ao comprimento que vibra: corte a corda pela metade e a frequência dobra.
    </text>
</svg>
