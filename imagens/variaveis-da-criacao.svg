<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">Variáveis da Criação — o painel de controle da vida</title>
    <desc id="desc">A vida depende de vários ajustes ao mesmo tempo. A distância ao Sol tem de cair dentro
        de uma faixa estreita, a zona habitável, onde a água é líquida: mais perto, ela ferve, como em
        Vênus; mais longe, congela, como em Marte. A gravidade também: fraca demais e o planeta perde a
        atmosfera para o espaço; forte demais e ela vira uma prensa. E não é um botão só — são muitos,
        e todos precisam estar no ponto ao mesmo tempo.</desc>

    <defs>
        <linearGradient id="espaco" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#131e3d"/>
            <stop offset="1" stop-color="#05070f"/>
        </linearGradient>
        <linearGradient id="zona" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#ff6b6b" stop-opacity="0.55"/>
            <stop offset="0.30" stop-color="#ffd24d" stop-opacity="0.45"/>
            <stop offset="0.44" stop-color="#7bd389" stop-opacity="0.55"/>
            <stop offset="0.60" stop-color="#7bd389" stop-opacity="0.55"/>
            <stop offset="0.76" stop-color="#63c7e8" stop-opacity="0.4"/>
            <stop offset="1" stop-color="#63c7e8" stop-opacity="0.5"/>
        </linearGradient>
        <radialGradient id="sol" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#fff6cf"/>
            <stop offset="0.5" stop-color="#ffcf49"/>
            <stop offset="1" stop-color="#ff8a1f" stop-opacity="0"/>
        </radialGradient>
        <marker id="s-8fa8d8" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#8fa8d8"/>
        </marker>
        <marker id="s-ff6b6b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#ff6b6b"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#eaf0ff; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#cdd8f2; font-size:18px; font-weight:700; }
        .rotp { fill:#8fa8d8; font-size:14px; }
        .painel { fill:#101a35; stroke:#3a4d80; stroke-width:2; }
    </style>

    <rect width="1400" height="800" fill="url(#espaco)"/>

    <text class="cab" x="46" y="54">VARIÁVEIS DA CRIAÇÃO</text>
    <text class="rotp" x="46" y="84" font-size="17">Não é um botão no ponto certo. São muitos — e todos ao mesmo tempo.</text>

    <!-- ══ Cima: a zona habitável ═════════════════════════════════════════ -->
    <g transform="translate(46,112)">
        <rect class="painel" x="0" y="0" width="1308" height="290" rx="16"/>
        <text class="rot" x="24" y="38" style="fill:#7bd389">A FAIXA ONDE A ÁGUA É LÍQUIDA</text>
        <text class="rotp" x="24" y="60">um passo para dentro, ela ferve; um passo para fora, ela vira gelo</text>

        <!-- o Sol -->
        <g transform="translate(70,180)">
            <circle cx="0" cy="0" r="66" fill="url(#sol)"/>
            <circle cx="0" cy="0" r="34" fill="#ffcf49"/>
            <text class="rotp" x="0" y="88" text-anchor="middle" font-weight="700" style="fill:#ffd24d">SOL</text>
        </g>

        <!-- a régua das distâncias -->
        <g transform="translate(150,180)">
            <rect x="0" y="-26" width="1096" height="52" rx="10" fill="url(#zona)"/>
            <path d="M0 40 H 1096" stroke="#3a4d80" stroke-width="2"/>

            <!-- Vênus -->
            <g transform="translate(190,0)">
                <circle cx="0" cy="0" r="24" fill="#d99a55" stroke="#f0c68f" stroke-width="2"/>
                <text class="rot" x="0" y="-42" text-anchor="middle" font-size="16" style="fill:#ff6b6b">VÊNUS</text>
                <text class="rotp" x="0" y="64" text-anchor="middle" font-size="13" style="fill:#ff6b6b">perto demais</text>
                <text class="rotp" x="0" y="84" text-anchor="middle" font-size="13" style="fill:#ff6b6b">460 °C: a água ferveu e sumiu</text>
            </g>

            <!-- Terra -->
            <g transform="translate(520,0)">
                <circle cx="0" cy="0" r="30" fill="#2b5b8f" stroke="#7bd389" stroke-width="3"/>
                <path d="M-22 -10 C -10 -18, 4 -6, 18 -14 C 24 -18, 28 -10, 26 -4
                         C 12 6, -6 14, -20 6 Z" fill="#4ec07a"/>
                <text class="rot" x="0" y="-48" text-anchor="middle" font-size="17" style="fill:#7bd389">A TERRA</text>
                <text class="rotp" x="0" y="70" text-anchor="middle" font-size="13" style="fill:#7bd389" font-weight="700">
                    no ponto exato
                </text>
                <text class="rotp" x="0" y="90" text-anchor="middle" font-size="13" style="fill:#7bd389">
                    a única faixa em que há oceano, chuva e rio
                </text>
            </g>

            <!-- Marte -->
            <g transform="translate(840,0)">
                <circle cx="0" cy="0" r="20" fill="#a4503a" stroke="#e0917a" stroke-width="2"/>
                <text class="rot" x="0" y="-40" text-anchor="middle" font-size="16" style="fill:#63c7e8">MARTE</text>
                <text class="rotp" x="0" y="60" text-anchor="middle" font-size="13" style="fill:#63c7e8">longe demais</text>
                <text class="rotp" x="0" y="80" text-anchor="middle" font-size="13" style="fill:#63c7e8">−60 °C: a água virou gelo</text>
            </g>

            <text class="rotp" x="1090" y="-40" text-anchor="end" font-size="13">distância ao Sol →</text>
        </g>
    </g>

    <!-- ══ Baixo-esquerda: a gravidade ════════════════════════════════════ -->
    <g transform="translate(46,424)">
        <rect class="painel" x="0" y="0" width="640" height="308" rx="16"/>
        <text class="rot" x="24" y="38">E A GRAVIDADE, QUE SEGURA O AR</text>
        <text class="rotp" x="24" y="60">a atmosfera fica presa por um fio — o peso dela mesma</text>

        <!-- fraca -->
        <g transform="translate(112,190)">
            <circle cx="0" cy="0" r="42" fill="#8a5b4a" stroke="#c08b78" stroke-width="2"/>
            <g stroke="#ff6b6b" stroke-width="2.5" fill="none">
                <path d="M-20 -40 L -34 -70" marker-end="url(#s-ff6b6b)"/>
                <path d="M6 -44 L 8 -78" marker-end="url(#s-ff6b6b)"/>
                <path d="M28 -32 L 48 -60" marker-end="url(#s-ff6b6b)"/>
            </g>
            <text class="rot" x="0" y="72" text-anchor="middle" font-size="16" style="fill:#ff6b6b">FRACA</text>
            <text class="rotp" x="0" y="94" text-anchor="middle" font-size="13" style="fill:#ff6b6b">o ar escapa</text>
            <text class="rotp" x="0" y="112" text-anchor="middle" font-size="13" style="fill:#ff6b6b">e o planeta seca</text>
        </g>

        <!-- certa -->
        <g transform="translate(320,190)">
            <circle cx="0" cy="0" r="52" fill="#7bd389" opacity="0.18"/>
            <circle cx="0" cy="0" r="42" fill="#2b5b8f" stroke="#7bd389" stroke-width="3"/>
            <path d="M-30 -14 C -14 -24, 6 -8, 24 -18 C 32 -22, 38 -14, 36 -6
                     C 16 6, -8 18, -28 8 Z" fill="#4ec07a"/>
            <text class="rot" x="0" y="82" text-anchor="middle" font-size="16" style="fill:#7bd389">NO PONTO</text>
            <text class="rotp" x="0" y="104" text-anchor="middle" font-size="13" style="fill:#7bd389">segura o ar sem esmagar nada</text>
        </g>

        <!-- forte -->
        <g transform="translate(528,190)">
            <circle cx="0" cy="0" r="42" fill="#4a4258" stroke="#8d84a0" stroke-width="2"/>
            <g stroke="#ffd24d" stroke-width="3" fill="none">
                <path d="M-26 -56 L -26 -34"/><path d="M0 -62 L 0 -38"/><path d="M26 -56 L 26 -34"/>
            </g>
            <ellipse cx="0" cy="-30" rx="46" ry="12" fill="#ffd24d" opacity="0.35"/>
            <text class="rot" x="0" y="72" text-anchor="middle" font-size="16" style="fill:#ffd24d">FORTE</text>
            <text class="rotp" x="0" y="94" text-anchor="middle" font-size="13" style="fill:#ffd24d">o ar vira uma prensa</text>
            <text class="rotp" x="0" y="112" text-anchor="middle" font-size="13" style="fill:#ffd24d">quente e sufocante</text>
        </g>
    </g>

    <!-- ══ Baixo-direita: o painel de botões ══════════════════════════════ -->
    <g transform="translate(714,424)">
        <rect class="painel" x="0" y="0" width="640" height="308" rx="16"/>
        <text class="rot" x="24" y="38" style="fill:#ffd24d">OS DOIS BOTÕES DO DESAFIO</text>
        <text class="rotp" x="24" y="60">e os dois têm de estar no ponto AO MESMO TEMPO</text>

        <g transform="translate(28,96)">
            <g>
                <text class="rot" x="0" y="16" font-size="16">Gravidade</text>
                <rect x="210" y="4" width="370" height="14" rx="7" fill="#0b1226" stroke="#3a4d80" stroke-width="1.5"/>
                <rect x="377" y="1" width="20" height="20" rx="5" fill="#7bd389"/>
                <text class="rotp" x="210" y="42" font-size="12" style="fill:#ff6b6b">fraca: o ar foge</text>
                <text class="rotp" x="580" y="42" text-anchor="end" font-size="12" style="fill:#ffd24d">forte: o ar esmaga</text>
            </g>

            <g transform="translate(0,80)">
                <text class="rot" x="0" y="16" font-size="16">Distância ao Sol</text>
                <rect x="210" y="4" width="370" height="14" rx="7" fill="#0b1226" stroke="#3a4d80" stroke-width="1.5"/>
                <rect x="377" y="1" width="20" height="20" rx="5" fill="#7bd389"/>
                <text class="rotp" x="210" y="42" font-size="12" style="fill:#ff6b6b">perto: a água ferve</text>
                <text class="rotp" x="580" y="42" text-anchor="end" font-size="12" style="fill:#63c7e8">longe: a água congela</text>
            </g>

            <!-- a linha do ponto exato, atravessando os dois -->
            <path d="M387 -8 V 104" stroke="#7bd389" stroke-width="2" stroke-dasharray="6 5" opacity="0.8"/>
            <text class="rotp" x="387" y="-16" text-anchor="middle" font-size="12" style="fill:#7bd389" font-weight="700">
                o ponto exato
            </text>
        </g>

        <text class="rotp" x="28" y="266" font-size="15" font-style="italic">
            Mexa em um só e a vida some. E estes são apenas os dois que o desafio deixa você tocar —
        </text>
        <text class="rotp" x="28" y="290" font-size="15" font-style="italic">
            fora deste painel há dezenas de outros, todos igualmente ajustados.
        </text>
    </g>
</svg>
