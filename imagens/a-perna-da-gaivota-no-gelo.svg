<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A Perna da Gaivota no Gelo — o trocador de calor em contracorrente</title>
    <desc id="desc">O jogo pede recuperar quase todo o calor; esta ilustração mostra por quê só a
        contracorrente consegue. Dois canos lado a lado: na mesma direção, cerca de metade do calor
        passa da água quente para a fria; em direções opostas, quase todo. Na perna da gaivota, a
        artéria (quente, descendo) e a veia (fria, subindo) correm coladas e opostas, então o sangue
        volta ao corpo já aquecido e os pés ficam frios sem congelar a ave.</desc>

    <defs>
        <linearGradient id="fundo" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#eaf3f6"/>
            <stop offset="1" stop-color="#d5e7ec"/>
        </linearGradient>
        <linearGradient id="quente" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#ff6a4d"/>
            <stop offset="1" stop-color="#ffd23a"/>
        </linearGradient>
        <linearGradient id="frio" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#3aa0ff"/>
            <stop offset="1" stop-color="#8fd0ff"/>
        </linearGradient>
        <marker id="g-q" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#e0532f"/>
        </marker>
        <marker id="g-f" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#2f7fd0"/>
        </marker>
        <marker id="g-h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#f0a020"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#134b52; font-size:28px; font-weight:800; letter-spacing:1.1px; }
        .rot  { fill:#1d6f78; font-size:18px; font-weight:700; }
        .rotp { fill:#5c7b80; font-size:14px; }
        .painel { fill:#ffffff; stroke:#bcd8d6; stroke-width:2; }
        .big  { fill:#134b52; font-size:22px; font-weight:800; }
        .ok   { fill:#2f8f5c; }
        .warn { fill:#c0682b; }
    </style>

    <rect width="1400" height="800" fill="url(#fundo)"/>

    <text class="cab" x="46" y="54">A PERNA DA GAIVOTA NO GELO</text>
    <text class="rotp" x="46" y="84" font-size="17">
        Por que a ave fica em pé no gelo e não congela? A resposta é um detalhe de projeto que os engenheiros copiam.
    </text>

    <!-- ══ Esquerda: o experimento dos dois canos ═════════════════════════ -->
    <g transform="translate(46,112)">
        <rect class="painel" x="0" y="0" width="760" height="392" rx="16"/>
        <text class="rot" x="24" y="38">DOIS CANOS, ÁGUA QUENTE E ÁGUA FRIA</text>
        <text class="rotp" x="24" y="60">o sentido do fluxo decide quanto calor passa de um para o outro</text>

        <!-- caso 1: mesma direção -->
        <g transform="translate(24,84)">
            <rect x="0" y="0" width="712" height="132" rx="12" fill="#fff5ef" stroke="#f0cdb8"/>
            <text class="warn" x="20" y="30" font-size="16">MESMA DIREÇÃO → passa só ~50%</text>
            <!-- cano quente -->
            <rect x="20" y="46" width="470" height="22" rx="11" fill="url(#quente)"/>
            <line x1="40" y1="57" x2="470" y2="57" stroke="#ffffff" stroke-width="2" marker-end="url(#g-q)" opacity="0.8"/>
            <!-- cano frio -->
            <rect x="20" y="86" width="470" height="22" rx="11" fill="url(#frio)"/>
            <line x1="40" y1="97" x2="470" y2="97" stroke="#ffffff" stroke-width="2" marker-end="url(#g-f)" opacity="0.8"/>
            <!-- setas de calor fracas -->
            <g stroke="#e6a35a" stroke-width="2" opacity="0.6">
                <line x1="120" y1="70" x2="120" y2="84" marker-end="url(#g-h)"/>
                <line x1="230" y1="70" x2="230" y2="84" marker-end="url(#g-h)"/>
                <line x1="340" y1="70" x2="340" y2="84" marker-end="url(#g-h)"/>
            </g>
            <text class="big warn" x="600" y="72" text-anchor="middle">~50%</text>
            <text class="rotp" x="600" y="96" text-anchor="middle" font-size="13">do calor</text>
        </g>

        <!-- caso 2: direções opostas -->
        <g transform="translate(24,232)">
            <rect x="0" y="0" width="712" height="132" rx="12" fill="#eef8f2" stroke="#a9dcc0"/>
            <text class="ok" x="20" y="30" font-size="16">DIREÇÕES OPOSTAS → passa quase TUDO</text>
            <!-- cano quente (→) -->
            <rect x="20" y="46" width="470" height="22" rx="11" fill="url(#quente)"/>
            <line x1="40" y1="57" x2="470" y2="57" stroke="#ffffff" stroke-width="2" marker-end="url(#g-q)" opacity="0.8"/>
            <!-- cano frio (←) -->
            <rect x="20" y="86" width="470" height="22" rx="11" fill="url(#frio)"/>
            <line x1="470" y1="97" x2="40" y2="97" stroke="#ffffff" stroke-width="2" marker-end="url(#g-f)" opacity="0.8"/>
            <!-- setas de calor fortes ao longo de todo o contato -->
            <g stroke="#f0a020" stroke-width="3" opacity="0.95">
                <line x1="95" y1="70" x2="95" y2="84" marker-end="url(#g-h)"/>
                <line x1="190" y1="70" x2="190" y2="84" marker-end="url(#g-h)"/>
                <line x1="285" y1="70" x2="285" y2="84" marker-end="url(#g-h)"/>
                <line x1="380" y1="70" x2="380" y2="84" marker-end="url(#g-h)"/>
            </g>
            <text class="big ok" x="600" y="72" text-anchor="middle">~100%</text>
            <text class="rotp" x="600" y="96" text-anchor="middle" font-size="13">do calor</text>
        </g>
    </g>

    <!-- ══ Direita: a perna da gaivota ════════════════════════════════════ -->
    <g transform="translate(834,112)">
        <rect class="painel" x="0" y="0" width="520" height="392" rx="16"/>
        <text class="rot" x="24" y="38">NA PERNA DA AVE</text>
        <text class="rotp" x="24" y="60">artéria e veia coladas, em sentidos opostos</text>

        <!-- gaivota em pé (silhueta mais definida) -->
        <g transform="translate(60,78)">
            <!-- corpo branco -->
            <ellipse cx="104" cy="28" rx="64" ry="26" fill="#f4f7fa" stroke="#c0ccd6" stroke-width="2"/>
            <!-- cauda -->
            <path d="M42 30 L14 37 L46 41 Z" fill="#aebdc8"/>
            <!-- asa dobrada (cinza) -->
            <path d="M52 22 Q100 4 156 18 Q150 31 138 35 Q96 37 60 34 Q50 30 52 22 Z" fill="#c3ced8"/>
            <!-- pescoço -->
            <path d="M148 18 Q172 15 180 3 Q189 9 183 21 Q168 27 148 26 Z" fill="#f6f9fc" stroke="#c0ccd6" stroke-width="1.5"/>
            <!-- cabeça -->
            <circle cx="188" cy="3" r="16" fill="#f8fbfe" stroke="#c0ccd6" stroke-width="1.5"/>
            <!-- bico amarelo com a marca vermelha típica da gaivota -->
            <path d="M202 3 Q223 3 227 8 Q218 11 202 9 Z" fill="#f2b23a" stroke="#d69426" stroke-width="1"/>
            <circle cx="216" cy="8" r="2.4" fill="#e0532f"/>
            <!-- olho -->
            <circle cx="193" cy="-1" r="3" fill="#26323c"/>

            <!-- os dois vasos na perna (contracorrente) -->
            <!-- artéria: quente em cima → esfria descendo -->
            <rect x="96" y="52" width="14" height="196" rx="7" fill="url(#quente)"/>
            <line x1="103" y1="70" x2="103" y2="236" stroke="#ffffff" stroke-width="2" marker-end="url(#g-q)" opacity="0.7"/>
            <!-- veia: fria embaixo → esquenta subindo -->
            <rect x="120" y="52" width="14" height="196" rx="7" fill="url(#frio)"/>
            <line x1="127" y1="236" x2="127" y2="70" stroke="#ffffff" stroke-width="2" marker-end="url(#g-f)" opacity="0.7"/>

            <!-- setas de calor cruzando (artéria → veia) ao longo de toda a perna -->
            <g stroke="#f0a020" stroke-width="2.5" opacity="0.9">
                <line x1="110" y1="80"  x2="120" y2="80"  marker-end="url(#g-h)"/>
                <line x1="110" y1="120" x2="120" y2="120" marker-end="url(#g-h)"/>
                <line x1="110" y1="160" x2="120" y2="160" marker-end="url(#g-h)"/>
                <line x1="110" y1="200" x2="120" y2="200" marker-end="url(#g-h)"/>
            </g>

            <!-- pé sobre o gelo -->
            <rect x="88" y="248" width="58" height="12" rx="4" fill="#e8b98a"/>
            <rect x="60" y="262" width="120" height="18" rx="4" fill="#bfe6ff" stroke="#8fc4e6"/>

            <!-- rótulos -->
            <text class="rotp" x="230" y="70" font-size="13" fill="#c0682b">quente</text>
            <text class="rotp" x="230" y="90" font-size="12">volta ao corpo</text>
            <text class="rotp" x="230" y="238" font-size="13" fill="#2f7fd0">frio nos pés</text>
            <text class="rotp" x="230" y="276" font-size="13">gelo</text>
        </g>
    </g>

    <!-- ══ Rodapé: três cartões ═══════════════════════════════════════════ -->
    <g transform="translate(46,532)">
        <g>
            <rect class="painel" width="422" height="224" rx="16"/>
            <text class="rot" x="22" y="40">O TRUQUE DA CONTRACORRENTE</text>
            <text class="rotp" x="22" y="72" font-size="15">O sangue quente que desce reaquece,</text>
            <text class="rotp" x="22" y="92" font-size="15">passo a passo, o sangue frio que sobe.</text>
            <text class="rotp" x="22" y="112" font-size="15">Quase todo o calor fica no corpo, em</text>
            <text class="rotp" x="22" y="132" font-size="15">vez de escapar pelos pés no gelo.</text>
            <text class="big ok" x="22" y="180" font-size="18">Pés frios, corpo quente.</text>
        </g>
        <g transform="translate(443,0)">
            <rect class="painel" width="422" height="224" rx="16"/>
            <text class="rot" x="22" y="40">OS ENGENHEIROS COPIAM</text>
            <text class="rotp" x="22" y="72" font-size="15">O engenheiro Arthur P. Fraas chamou o</text>
            <text class="rotp" x="22" y="92" font-size="15">projeto da ave de “um dos mais eficazes</text>
            <text class="rotp" x="22" y="112" font-size="15">‘trocadores de calor’ do mundo”.</text>
            <text class="rotp" x="22" y="140" font-size="15">Engenheiros copiam o mesmo princípio em</text>
            <text class="rotp" x="22" y="160" font-size="15">trocadores de calor de usinas e fábricas.</text>
            <text class="big" x="22" y="200" font-size="17" fill="#1d6f78">Nós imitamos; ela já vinha pronta.</text>
        </g>
        <g transform="translate(886,0)">
            <rect class="painel" width="422" height="224" rx="16" fill="#eef8f2" stroke="#a9dcc0"/>
            <text class="rot ok" x="22" y="40">ISSO TEVE UM PROJETO?</text>
            <text class="rotp" x="22" y="76" font-size="15">Copiamos o que já estava pronto na perna</text>
            <text class="rotp" x="22" y="96" font-size="15">de uma gaivota. Um projeto que se imita</text>
            <text class="rotp" x="22" y="116" font-size="15">teve, primeiro, um projetista.</text>
            <text class="rotp" x="22" y="152" font-size="15" font-style="italic">“Pergunta agora aos animais, e eles te</text>
            <text class="rotp" x="22" y="172" font-size="15" font-style="italic">instruirão.” — Jó 12:7-9</text>
            <text class="big ok" x="22" y="206" font-size="17">Isso teve um Projeto?</text>
        </g>
    </g>
</svg>
