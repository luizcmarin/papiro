                <circle cx="-25" cy="-25" r="2.9"/><circle cx="-0" cy="37" r="2.9"/><circle cx="26" cy="-26" r="2.9"/><circle cx="-38" cy="0" r="2.9"/><circle cx="27" cy="27" r="2.9"/><circle cx="0" cy="-39" r="2.9"/>
                <circle cx="-28" cy="28" r="2.9"/><circle cx="41" cy="0" r="2.9"/><circle cx="-29" cy="-29" r="2.9"/><circle cx="-0" cy="42" r="2.9"/><circle cx="30" cy="-30" r="2.9"/><circle cx="-43" cy="-0" r="2.9"/>
                <circle cx="31" cy="31" r="2.9"/><circle cx="0" cy="-44" r="2.9"/><circle cx="-32" cy="32" r="2.9"/><circle cx="46" cy="0" r="2.9"/><circle cx="-33" cy="-33" r="2.9"/><circle cx="0" cy="47" r="2.9"/>
