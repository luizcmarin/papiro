                <circle cx="18" cy="18" r="2.9"/><circle cx="-0" cy="-27" r="2.9"/><circle cx="-20" cy="20" r="2.9"/><circle cx="29" cy="0" r="2.9"/><circle cx="-21" cy="-21" r="2.9"/><circle cx="-0" cy="31" r="2.9"/>
