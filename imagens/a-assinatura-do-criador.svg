                <circle cx="42" cy="-42" r="2.9"/><circle cx="-59" cy="-0" r="2.9"/><circle cx="42" cy="42" r="2.9"/><circle cx="-0" cy="-60" r="2.9"/><circle cx="-43" cy="43" r="2.9"/><circle cx="61" cy="0" r="2.9"/>
                <circle cx="-43" cy="-43" r="2.9"/><circle cx="-0" cy="62" r="2.9"/><circle cx="44" cy="-44" r="2.9"/><circle cx="-63" cy="-0" r="2.9"/><circle cx="45" cy="45" r="2.9"/><circle cx="0" cy="-64" r="2.9"/>
                <circle cx="-45" cy="45" r="2.9"/><circle cx="64" cy="0" r="2.9"/><circle cx="-46" cy="-46" r="2.9"/><circle cx="-0" cy="65" r="2.9"/><circle cx="46" cy="-46" r="2.9"/><circle cx="-66" cy="0" r="2.9"/>
