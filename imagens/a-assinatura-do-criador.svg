<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A Assinatura do Criador na Natureza — o ângulo de ouro</title>
    <desc id="desc">O girassol acrescenta cada semente girada cerca de 137,5 graus em relação à anterior.
        Esse ângulo é a volta dividida pela Regra de Ouro — e é o único que nunca se repete. Basta trocá-lo
        por uma fração simples da volta, como 135 graus, que é três oitavos, para as sementes se alinharem
        em oito braços e deixarem buracos enormes. Com 137,5 graus, elas se encaixam sem sobra, e as
        espirais que aparecem no disco vêm sempre em números da sequência de Fibonacci.</desc>

    <defs>
        <linearGradient id="fundo" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fdf6e2"/>
            <stop offset="1" stop-color="#efe0b6"/>
        </linearGradient>
        <radialGradient id="disco" cx="0.4" cy="0.35" r="0.7">
            <stop offset="0" stop-color="#7a5c2a"/>
            <stop offset="1" stop-color="#463216"/>
        </radialGradient>
        <marker id="s-8a6a1f" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#8a6a1f"/>
        </marker>
    </defs>

    <style>
        .cab  { fill:#5a4210; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#8a6a1f; font-size:18px; font-weight:700; }
        .rotp { fill:#a68b52; font-size:14px; }
        .painel { fill:#fffdf4; stroke:#d9c184; stroke-width:2; }
    </style>

    <rect width="1400" height="800" fill="url(#fundo)"/>

    <text class="cab" x="46" y="54">A ASSINATURA DO CRIADOR NA NATUREZA</text>
    <text class="rotp" x="46" y="84" font-size="17">Um único ângulo empacota mil sementes sem deixar sobra. Erre por dois graus e aparecem buracos.</text>

