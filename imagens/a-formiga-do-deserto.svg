<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img"
     aria-labelledby="tit desc" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <title id="tit">A Formiga do Deserto — integração de caminho</title>
    <desc id="desc">A formiga Cataglyphis sai do formigueiro em ziguezague à procura de comida, mas volta
        em linha reta: ela soma direção (bússola solar, pela luz polarizada) e distância (podômetro
        interno, contando passos) o tempo todo, e disso resulta o vetor de volta para casa.</desc>

    <defs>
        <linearGradient id="ceu" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffd479"/>
            <stop offset="0.55" stop-color="#ffb45e"/>
            <stop offset="1" stop-color="#f7a05a"/>
        </linearGradient>
        <linearGradient id="areia" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f4c98a"/>
            <stop offset="1" stop-color="#e0a865"/>
        </linearGradient>
        <radialGradient id="sol" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#fffbe8"/>
            <stop offset="0.35" stop-color="#fff0b0" stop-opacity="0.9"/>
            <stop offset="1" stop-color="#ffe08a" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="duna" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#eab873"/>
            <stop offset="1" stop-color="#d99b5b"/>
        </linearGradient>

        <!-- pontas de seta com tamanho fixo (não escalam com a espessura do traço) -->
        <marker id="s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="14" markerHeight="14"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/>
        </marker>
        <marker id="sp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/>
        </marker>
        <marker id="si" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="9" markerHeight="9"
                markerUnits="userSpaceOnUse" orient="auto">
            <path d="M10 0 L0 5 L10 10 z" fill="context-stroke"/>
        </marker>

        <!-- a formiga, desenhada uma vez e reusada -->
        <g id="formiga">
            <g stroke="#5a2a12" stroke-width="2" fill="none" stroke-linecap="round">
                <path d="M-6 2 L -14 10 M-2 3 L -6 13 M2 3 L 6 13 M6 2 L 14 10"/>
                <path d="M-9 -6 L -16 -13 M9 -6 L 16 -13"/>
            </g>
            <ellipse cx="-11" cy="0" rx="8" ry="6" fill="#8c3b18"/>
            <ellipse cx="0" cy="0" rx="5" ry="4.5" fill="#a34a1f"/>
            <ellipse cx="9" cy="-1" rx="6" ry="5" fill="#8c3b18"/>
            <circle cx="12" cy="-3" r="1.6" fill="#2b1206"/>
        </g>
    </defs>

    <style>
        .cab  { fill:#4a2409; font-size:28px; font-weight:800; letter-spacing:1.2px; }
        .rot  { fill:#5a2a12; font-size:19px; font-weight:700; }
        .rotp { fill:#7a4a26; font-size:15px; }
        .num  { fill:#fff6e2; font-size:19px; font-weight:800; }
        .painel { fill:#fff6e6; stroke:#c98a4e; stroke-width:2; }
    </style>

    <!-- ══ Cenário: céu, sol, dunas, areia ════════════════════════════════ -->
    <rect width="1400" height="800" fill="url(#ceu)"/>
    <circle cx="1130" cy="120" r="180" fill="url(#sol)"/>
    <circle cx="1130" cy="120" r="42" fill="#fffdf2"/>

    <!-- Horizonte alto: a cena ocupa a tela, sem uma faixa morta de céu. -->
    <path d="M0 210 C 180 160, 300 210, 470 198 C 640 186, 760 142, 940 168
             C 1120 194, 1280 160, 1400 182 L 1400 900 L 0 900 Z" fill="url(#duna)"/>
    <path d="M0 270 C 220 230, 420 282, 640 260 C 860 238, 1080 282, 1400 246
             L 1400 900 L 0 900 Z" fill="url(#areia)"/>

    <!-- rachaduras do chão seco -->
    <g stroke="#c99257" stroke-width="1.5" opacity="0.5" fill="none">
        <path d="M60 650 L 130 614 L 210 640 M300 690 L 380 656 L 450 680"/>
        <path d="M700 704 L 790 676 M880 650 L 960 678 L 1030 654"/>
    </g>

    <text class="cab" x="46" y="58">A FORMIGA DO DESERTO</text>
    <text class="rotp" x="46" y="86" font-size="17">Cataglyphis: sai torto, volta reto.</text>

    <!-- A cena inteira sobe junto com o horizonte. -->
    <g transform="translate(0,-50)">

    <!-- ══ Formigueiro ════════════════════════════════════════════════════ -->
    <!-- 140, e não 120: em 120 a legenda ("…e de chegada") encostava na borda. -->
    <g transform="translate(140,430)">
        <ellipse cx="0" cy="52" rx="96" ry="22" fill="#c98a4e" opacity="0.45"/>
        <path d="M-84 52 C -60 -18, -22 -44, 0 -44 C 22 -44, 60 -18, 84 52 Z"
              fill="#c98a4e" stroke="#a06a35" stroke-width="2.5"/>
        <ellipse cx="0" cy="-30" rx="16" ry="8" fill="#6d4319"/>
        <text class="rot" x="0" y="88" text-anchor="middle">FORMIGUEIRO</text>
        <text class="rotp" x="0" y="110" text-anchor="middle">o ponto de partida — e de chegada</text>
    </g>

    <!-- ══ Ida: ziguezague à procura de comida ════════════════════════════ -->
    <g fill="none" stroke="#2f7fd0" stroke-width="5" stroke-dasharray="16 11" stroke-linecap="round">
        <path d="M150 420 C 210 392, 250 448, 312 430" marker-end="url(#sp)"/>
        <path d="M320 444 C 372 486, 300 520, 268 560" marker-end="url(#sp)"/>
        <path d="M276 578 C 340 606, 420 566, 470 596" marker-end="url(#sp)"/>
        <path d="M486 610 C 540 646, 470 686, 520 712" marker-end="url(#sp)"/>
        <path d="M540 722 C 600 742, 660 706, 706 700" marker-end="url(#sp)"/>
    </g>

    <use href="#formiga" transform="translate(238,404) rotate(-8)"/>
    <use href="#formiga" transform="translate(286,532) rotate(78)"/>
    <use href="#formiga" transform="translate(400,578) rotate(-6)"/>
    <use href="#formiga" transform="translate(520,690) rotate(-24)"/>

    <text class="rot" x="330" y="380" style="fill:#1f5f9e">IDA: ZIGUEZAGUE</text>
    <text class="rotp" x="330" y="402" style="fill:#2f7fd0">procurando comida, sem rumo fixo</text>

    <!-- comida -->
    <g transform="translate(742,696)">
        <use href="#formiga" transform="rotate(-10)"/>
        <ellipse cx="30" cy="6" rx="16" ry="7" fill="#8a5a2b" transform="rotate(-14)"/>
        <text class="rot" x="18" y="44" text-anchor="middle">COMIDA</text>
    </g>

    <!-- ══ Volta: o vetor de casa ═════════════════════════════════════════ -->
    <!-- Reta de (726,668) a (190,452): inclinação de -22°. Os rótulos seguem essa
         mesma inclinação, encostados na seta, e a formiga viaja EM CIMA dela. -->
    <path d="M726 668 L 190 452" stroke="#d63f2a" stroke-width="9" marker-end="url(#s)"/>
    <!-- Rótulo no trecho LIVRE da seta (x≈560): mais à esquerda ele atravessava o
         pontilhado da ida. A reta CAI para a direita (dy/dx = +0,40 com o y para
         baixo do SVG), então o giro é +22° — com −22° o texto subia e cruzava a seta. -->
    <g transform="rotate(22 560 601)">
        <text class="rot" x="560" y="546" style="fill:#b0301f" font-size="22" text-anchor="middle">
            VOLTA PARA CASA EM LINHA RETA
        </text>
        <text class="rotp" x="560" y="570" style="fill:#b0301f" text-anchor="middle">
            o caminho que ela nunca percorreu antes
        </text>
    </g>
    <use href="#formiga" transform="translate(600,617) rotate(202) scale(1.3)"/>

    </g><!-- /cena -->

    <!-- ══ Painel: integração de caminho ══════════════════════════════════ -->
    <g transform="translate(1020,150)">
        <rect class="painel" x="0" y="0" width="340" height="600" rx="16"/>

        <text class="rot" x="170" y="44" text-anchor="middle" font-size="20">INTEGRAÇÃO DE CAMINHO</text>
        <text class="rotp" x="170" y="68" text-anchor="middle">duas medidas, somadas o tempo todo</text>

        <!-- Medida 1: direção.  Caixa 292 de largura: nada de texto passa de x=280.
             Bloco 86→232, deixando o rodapé do painel (600) com folga real. -->
        <g transform="translate(24,86)">
            <rect x="0" y="0" width="292" height="146" rx="12" fill="#ffe9c7" stroke="#dda765" stroke-width="1.5"/>
            <circle cx="26" cy="26" r="14" fill="#2f7fd0"/>
            <text class="num" x="26" y="33" text-anchor="middle">1</text>
            <text class="rot" x="50" y="33" font-size="17">DIREÇÃO</text>

            <!-- bússola celeste, lendo a luz polarizada do sol -->
            <g transform="translate(54,96)">
                <circle cx="0" cy="0" r="28" fill="#fff6e6" stroke="#8c3b18" stroke-width="2"/>
                <path d="M0 -22 L 6 5 L 0 13 L -6 5 Z" fill="#d63f2a"/>
                <circle cx="0" cy="0" r="3" fill="#5a2a12"/>
            </g>
            <g stroke="#e8a33a" stroke-width="2.5" stroke-linecap="round">
                <path d="M92 98 L 126 76 M92 106 L 128 96 M92 114 L 126 118"/>
            </g>
            <circle cx="148" cy="94" r="15" fill="#ffd479" stroke="#e8a33a" stroke-width="2"/>
            <text class="rotp" x="176" y="88" font-size="13">luz polarizada</text>
            <text class="rotp" x="176" y="108" font-size="13">do céu — sua</text>
            <text class="rotp" x="176" y="128" font-size="13">bússola solar</text>
        </g>

        <!-- Medida 2: distância.  Bloco 248→394. -->
        <g transform="translate(24,248)">
            <rect x="0" y="0" width="292" height="146" rx="12" fill="#ffe9c7" stroke="#dda765" stroke-width="1.5"/>
            <circle cx="26" cy="26" r="14" fill="#2f7fd0"/>
            <text class="num" x="26" y="33" text-anchor="middle">2</text>
            <text class="rot" x="50" y="33" font-size="17">DISTÂNCIA</text>

            <use href="#formiga" transform="translate(58,98) scale(1.25)"/>
            <!-- pegadas: o podômetro interno conta cada passo -->
            <g fill="#8c3b18" opacity="0.75">
                <ellipse cx="100" cy="112" rx="5" ry="8"/>
                <ellipse cx="118" cy="100" rx="5" ry="8"/>
                <ellipse cx="136" cy="112" rx="5" ry="8"/>
                <ellipse cx="154" cy="100" rx="5" ry="8"/>
            </g>
            <text class="rotp" x="176" y="88" font-size="13">um podômetro</text>
            <text class="rotp" x="176" y="108" font-size="13">interno conta</text>
            <text class="rotp" x="176" y="128" font-size="13">cada passo</text>
        </g>

        <!-- A soma.  Bloco 410→560: 40px de respiro até a base do painel. -->
        <g transform="translate(24,410)">
            <path d="M146 0 L 146 24" stroke="#7a4a26" stroke-width="3" marker-end="url(#sp)"/>
            <rect x="0" y="32" width="292" height="118" rx="12" fill="#ffdfd8" stroke="#d63f2a" stroke-width="2"/>
            <text class="rot" x="146" y="64" text-anchor="middle" style="fill:#b0301f">VETOR PARA CASA</text>

            <path d="M46 100 L 246 100" stroke="#d63f2a" stroke-width="7" marker-end="url(#s)"/>
            <text class="rotp" x="146" y="136" text-anchor="middle" style="fill:#b0301f" font-size="14">
                direção + distância = a seta exata
            </text>
        </g>
    </g>

    <!-- rodapé: a ideia em uma linha -->
    <text class="rotp" x="46" y="770" font-size="16">
        Somando "de cabeça" cada trecho do trajeto, ela sabe, a qualquer instante, para onde fica o ninho.
    </text>
</svg>
